<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resonant Weave</title>
<style>
  body {
    margin: 0; padding: 0; overflow: hidden;
    background: #1a1814; touch-action: none;
    position: fixed; inset: 0;
  }

  /* SVG filters live off-screen */
  .svg-defs { position: absolute; width: 0; height: 0; overflow: hidden; }

  /* ── Weave filter layer (compositor-only transforms) ── */
  #weaveFilterLayer {
    position: fixed; inset: 0; width: 100vw; height: 100vh;
    pointer-events: none; z-index: 2;
    /* SVG wet-linen turbulence filter applied via GPU */
    filter: url(#wetLinen);
    will-change: transform, opacity;          /* compositor pre-compilation */
  }

  /* ── Canvas renders warm base threads + grain (backing store) ── */
  #weaveCanvas {
    display: block; width: 100vw; height: 100vh;
    position: fixed; inset: 0; z-index: 1;
  }

  /* Hidden tile for SVG filter source reuse */
  #textureCanvas {
    position: absolute; width: 512px; height: 512px; pointer-events: none;
  }

  /* ── Prompt overlay (removed after first gesture) ── */
  #startPrompt {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    background: rgba(26, 24, 20, 0.7); color: rgba(210, 195, 170, 0.6);
    font-family: system-ui, sans-serif; font-size: 14px; letter-spacing: 0.08em;
    cursor: pointer; user-select: none; transition: opacity 1.2s ease;
  }
  #startPrompt.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<!-- ═══ SVG filters ═══ -->
<svg class="svg-defs" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Wet linen: fractal Brownian noise, stitched & blurred -->
    <filter id="wetLinen" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014 0.020"
        numOctaves="5" seed="7" stitchTiles="stitch" result="noise"/>
      <feGaussianBlur in="noise" stdDeviation="0.5" result="softNoise"/>
      <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="2.5"
        xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feComponentTransfer in="displaced" result="sheen">
        <feFuncA type="linear" slope="1.06"/>
      </feComponentTransfer>
      <!-- Warm linen color matrix -->
      <feColorMatrix type="matrix"
        values=" 0.72 0.05 0.00 0.00 0.14
                 0.03 0.68 0.00 0.00 0.12
                 0.00 0.04 0.58 0.00 0.10
                 0.00 0.00 0.00 0.58 0.00"/>
    </filter>

    <!-- Micro-jitter filter: high-freq turbulence, tiny displacement -->
    <filter id="microJitter" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.06 0.09"
        numOctaves="2" seed="42" stitchTiles="stitch"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"
        xChannelSelector="R" yChannelSelector="B"/>
    </filter>
  </defs>
</svg>

<!-- ═══ Rendering layers ═══ -->
<canvas id="weaveFilterLayer"></canvas>
<canvas id="weaveCanvas"></canvas>
<canvas id="textureCanvas" width="512" height="512"></canvas>

<!-- Tap-to-start overlay (browser autoplay policy) -->
<div id="startPrompt">Tap to begin</div>

<script>
(function () {
  "use strict";

  /* ════════════════════════════════════════
     Audio — C-major continuous hum, breathy LFO
     ════════════════════════════════════════ */
  var audioCtx = null, masterGain = null, oscs = [], envGains = [], lfoNodes = [];

  /* Fundamental + second-harmonic partials for a warm, breathy C-major chord */
  var FREQS = [
    // fundamentals (subtle chest-resonance octave)
    { freq: 65.41,  amp: 0.12 },   // C2
    { freq: 82.41,  amp: 0.07 },   // E2
    { freq: 98.00,  amp: 0.05 },   // G2
    // octaves (body)
    { freq: 130.81, amp: 0.10 },   // C3
    { freq: 164.81, amp: 0.06 },   // E3
    { freq: 196.00, amp: 0.05 },   // G3
    // upper partials (breath / overtones)
    { freq: 261.63, amp: 0.025 },  // C4
    { freq: 329.63, amp: 0.015 }   // E4
  ];

  /* LFO parameters — smooth sinusoidal modulation for breath */
  var LFO_RATE = 0.18;          // 0.18 Hz → ~5.5 s per breath cycle (seamless)
  var LFO_DEP  = 0.065;         // amplitude depth from silence to peak

  /* Audio initialisation */
  function initAudio() {
    if (audioCtx) return;
    audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(audioCtx.destination);

    oscs        = [];
    envGains    = [];

    FREQS.forEach(function (p) {
      var osc     = audioCtx.createOscillator();
      var gain    = audioCtx.createGain();
      osc.detune.value  = (Math.random() - 0.5) * 6;   // organic chorus
      osc.type          = "sine";
      osc.frequency.value = p.freq;
      osc.connect(gain);
      gain.gain.value   = p.amp;
      gain.connect(masterGain);
      osc.start();
      oscs.push(osc);
      envGains.push(gain);
    });

    /* LFO → master gain (breathy envelope, perfectly looping sine) */
    var lfoOsc  = audioCtx.createOscillator();
    var lfoGain = audioCtx.createGain();
    lfoOsc.frequency.value = LFO_RATE;
    lfoOsc.type            = "sine";
    lfoOsc.connect(lfoGain.gain);
    lfoGain.gain.value     = LFO_DEP;
    lfoOsc.start();
    lfoOsc.connect(masterGain.gain);  // bias + modulate
    lfoNodes.push(lfoOsc, lfoGain);
  }

  function currentAmplitude() {
    if (!audioCtx || !masterGain) return 0;
    return masterGain.gain.value;
  }

  /* ════════════════════════════════════════
     Procedural wet-linen tile (drawn once)
     ════════════════════════════════════════ */
  var texCanvas  = document.getElementById("textureCanvas");
  var texCtx     = texCanvas.getContext("2d");

  /* Simplex-inspired 2-D hash for smooth noise */
  (function seedNoise() {
    var perm = new Uint8Array(512);
    var rng  = 42;
    function rand() { rng ^= (rng << 13); rng ^= (rng >> 17); rng ^= (rng << 5); return Math.abs(rng) % 256; }
    for (var i = 0; i < 256; i++) perm[i] = i;
    for (var i = 255; i > 0; i--) { var j = rand() % (i + 1); var t = perm[i]; perm[i] = perm[j]; perm[j] = t; }
    for (var i = 0; i < 256; i++) perm[i + 256] = perm[i];

    function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
    function grad(h, x, y) { var v = h & 3; return ((v & 1) ? -x : x) + ((v & 2) ? -y : y); }

    window.simplexNoise = function (x, y) {
      var X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
      x -= Math.floor(x); y -= Math.floor(y);
      var u = fade(x), v = fade(y);
      var a = perm[X] + Y, b = perm[X + 1] + Y;
      return (40 / 255) * (
        grad(perm[a],     x,     y)     * (1 - u) + grad(perm[b],     x - 1, y)     * u
      + (grad(perm[a + 1], x,     y - 1) * (1 - v) + grad(perm[b + 1], x - 1, y - 1) * v) * v);
    };

    window.noiseTile = function () {
      var w = texCanvas.width, h = texCanvas.height;
      var img = texCtx.createImageData(w, h);
      var d   = img.data;
      for (var y = 0; y < h; y++) {
        for (var x = 0; x < w; x++) {
          /* Horizontal warp fibers + vertical weft with organic variance */
          var wx = (x / w) * 4, wy = (y / h) * 9;
          var horiz   = simplexNoise(wx * 1.0, wy * 8.0);
          var vertic  = simplexNoise(wx * 7.0, wy * 1.5 + 37);
          var blend   = Math.sin((y / h) * Math.PI) * 0.3;  // stronger weft mid-canvas
          var raw     = (horiz * (1 - blend) + vertic * blend) * 255;
          /* Warm linen tint */
          var idx = (y * w + x) * 4;
          d[idx]     = Math.min(255, Math.max(0, raw * 0.78 + 36));
          d[idx + 1] = Math.min(255, Math.max(0, raw * 0.74 + 30));
          d[idx + 2] = Math.min(255, Math.max(0, raw * 0.68 + 24));
          d[idx + 3] = 255;
        }
      }
      texCtx.putImageData(img, 0, 0);
    };
    noiseTile();
  })();

  /* ════════════════════════════════════════
     Canvases & resize
     ════════════════════════════════════════ */
  var mainCanvas  = document.getElementById("weaveCanvas");
  var mainCtx     = mainCanvas.getContext("2d", { willReadFrequently: true });
  var filterLayer = document.getElementById("weaveFilterLayer");

  function resize() {
    mainCanvas.width  = window.innerWidth;
    mainCanvas.height = window.innerHeight;
    filterLayer.width = window.innerWidth;
    filterLayer.height= window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  /* ════════════════════════════════════════
     SVG filter references (for seed/scale jitter sync)
     ════════════════════════════════════════ */
  var wetLinenFilter   = document.getElementById("wetLinen");
  var wetTurbulenceEl  = wetLinenFilter.querySelector("feTurbulence");

  /* ════════════════════════════════════════
     Animation loop
     ════════════════════════════════════════ */
  var lastTime   = performance.now();
  var envPhase   = 0;
  var filterSeed = 7;

  function draw(t) {
    requestAnimationFrame(draw);
    var dt = t - lastTime; lastTime = t;
    var w  = mainCanvas.width, h = mainCanvas.height;
    if (w === 0 || h === 0) return;

    var a   = currentAmplitude();              // live audio amplitude (sync signal)
    var sec = t * 0.001;

    /* Phase accumulators for C3 / E3 / G3 */
    var cP = sec * 130.81, eP = sec * 164.81, gP = sec * 196.00;

    /* ── Warm base fill ── */
    mainCtx.fillStyle = "#1a1814";
    mainCtx.fillRect(0, 0, w, h);

    /* ── Tile texture for SVG filter source ── */
    var fCtx  = filterLayer.getContext("2d");
    var tw = texCanvas.width, th = texCanvas.height;
    fCtx.clearRect(0, 0, w, h);
    for (var fy = 0; fy < h; fy += th)
      for (var fx = 0; fx < w; fx += tw)
        fCtx.drawImage(texCanvas, fx, fy);

    /* ── Horizontal threads (G2-correlated jitter) ── */
    mainCtx.save();
    mainCtx.globalCompositeOperation = "softlight";
    var spY = Math.max(8, Math.floor(h / 45));
    for (var y = -spY; y < h + spY; y += spY) {
      /* Thread path displaced by audio-synced micro-jitter */
      var gy = y + simplexNoise(sec * 0.3, y * 0.012) * a * 1.8;
      mainCtx.strokeStyle = "rgba(210,195,170," + (0.08 + a * 0.04) + ")";
      mainCtx.lineWidth    = 0.6;
      mainCtx.beginPath();
      mainCtx.moveTo(0, gy);
      for (var x = 0; x <= w; x += 3) {
        var j = simplexNoise(cP * 0.15 + x * 0.008, y * 0.004) * a * 1.2;
        mainCtx.lineTo(x, gy + j);
      }
      mainCtx.stroke();
    }

    /* ── Vertical threads (E2-correlated jitter) ── */
    var spX = Math.max(12, Math.floor(w / 60));
    for (var x = -spX; x < w + spX; x += spX) {
      var gx = x + simplexNoise(sec * 0.25 + x * 0.01, eP * 0.1) * a * 1.5;
      mainCtx.strokeStyle = "rgba(200,185,160," + (0.07 + a * 0.03) + ")";
      mainCtx.lineWidth    = 0.5;
      mainCtx.beginPath();
      mainCtx.moveTo(gx, 0);
      for (var y = 0; y <= h; y += 3) {
        var j2 = simplexNoise(eP * 0.12 + y * 0.012, x * 0.006) * a * 0.8;
        mainCtx.lineTo(gx + j2, y);
      }
      mainCtx.stroke();
    }

    /* ── Grain overlay (amplitude-scaled noise pixels) ── */
    var gd = mainCtx.getImageData(0, 0, w, h);
    for (var i = 0; i < gd.data.length; i += 4) {
      var n = (Math.random() - 0.5) * (4 + a * 8);
      gd.data[i]     += n;
      gd.data[i + 1] += n - 1;
      gd.data[i + 2] += n - 2;
    }
    mainCtx.putImageData(gd, 0, 0);
    mainCtx.restore();

    /* ── Radial vignette (soft edges) ── */
    var cx = w / 2, cy = h / 2, r = Math.sqrt(cx * cx + cy * cy);
    var vig = mainCtx.createRadialGradient(cx, cy, r * 0.3, cx, cy, r);
    vig.addColorStop(0, "rgba(26,24,20,0)");
    vig.addColorStop(1, "rgba(10,9,7,0.55)");
    mainCtx.globalAlpha = 1;
    mainCtx.fillStyle   = vig;
    mainCtx.fillRect(0, 0, w, h);

    /* ── Compositor-thread filter updates (transform + opacity only) ── */
    var scaleBase = 1.0 + a * 0.0025;
    var tx        = simplexNoise(sec * 0.28, 0) * a * 0.35;
    var ty        = simplexNoise(0, sec * 0.22) * a * 0.28;
    filterLayer.style.transform   = "scale(" + scaleBase.toFixed(4) + ") translate(" + tx.toFixed(2) + "px," + ty.toFixed(2) + "px)";
    filterLayer.style.opacity     = (0.9 + a * 0.07).toFixed(3);

    /* ── SVG turbulence seed drift (audio-synced, keeps texture alive) ── */
    filterSeed = Math.floor(filterSeed + a * 0.08);
    wetTurbulenceEl.setAttribute("seed", String(filterSeed));
    wetTurbulenceEl.setAttribute(
      "baseFrequency",
      (0.014 + a * 0.003).toFixed(4) + " " + (0.020 + a * 0.005).toFixed(4)
    );
  }

  /* ════════════════════════════════════════
     Bootstrap: audio on user gesture
     ════════════════════════════════════════ */
  var started = false;
  function startAudio() {
    if (started) return;
    initAudio();
    if (audioCtx.state === "suspended") audioCtx.resume();
    masterGain.gain.setTargetAtTime(LFO_DEP * 0.5, audioCtx.currentTime, 0.8);
    started = true;
    document.getElementById("startPrompt").classList.add("hidden");
  }

  /* Start animation loop immediately (no audio until gesture) */
  requestAnimationFrame(draw);
  document.addEventListener("click",       startAudio, { once: true });
  document.addEventListener("keydown",     startAudio, { once: true });
  document.addEventListener("touchstart",  startAudio, { once: true });
})();
</script>
</body>
</html>
