<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bauhaus Digital — Art & Technology Are One</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
   --red: #D9381E;
   --yellow: #F6C42E;
   --blue: #1E50D9;
   --black: #1A1A1A;
   --white: #FAFAF7;
   --grey: #E8E6E1;
   --canvas-bg: #2A2A2A;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--black);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-user-select: none;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 900px;
  margin: 0 auto;
}

header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 16px 20px 12px;
  flex-shrink: 0;
}

header h1 {
  font-size: clamp(13px, 2.5vw, 16px);
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--white);
}

header .tagline {
  font-size: clamp(10px, 1.8vw, 12px);
  font-weight: 400;
  letter-spacing: 0.06em;
  color: #888;
}

#canvas-wrap {
  flex: 1;
  position: relative;
  margin: 0 20px;
  border-radius: 4px;
  overflow: hidden;
  min-height: 0;
  cursor: crosshair;
}

#canvas {
  width: 100%;
  height: 100%;
  display: block;
  background: var(--canvas-bg);
}

footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px 16px;
  flex-shrink: 0;
  gap: 10px;
  flex-wrap: wrap;
}

.btn {
  font-family: inherit;
  font-size: clamp(11px, 2vw, 13px);
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: none;
  border-radius: 3px;
  padding: 10px 18px;
  cursor: pointer;
  transition: transform 0.12s ease, filter 0.12s ease;
  outline: none;
}

.btn:active { transform: scale(0.95); filter: brightness(0.88); }
.btn:focus-visible { box-shadow: 0 0 0 2px var(--white); }

.btn-red { background: var(--red); color: var(--white); }
.btn-yellow { background: var(--yellow); color: var(--black); }
.btn-blue { background: var(--blue); color: var(--white); }
.btn-outline {
  background: transparent;
  color: #888;
  border: 1.5px solid #444;
}
.btn-outline:hover { border-color: #777; color: #aaa; }

#shape-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
}

#shape-indicator .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  transition: background 0.2s;
}

#shape-indicator .label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #666;
}

#color-row {
  display: flex;
  gap: 6px;
  align-items: center;
}

.swatch {
  width: 22px; height: 22px;
  border-radius: 3px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s;
  outline: none;
}
.swatch.active { border-color: var(--white); transform: scale(1.15); }
.swatch:focus-visible { box-shadow: 0 0 0 2px var(--white); }
.swatch-red { background: var(--red); }
.swatch-yellow { background: var(--yellow); }
.swatch-blue { background: var(--blue); }
.swatch-white { background: var(--white); }
.swatch-black { background: var(--black); border: 2px solid #444; }
.swatch-black.active { border-color: var(--white); }

#mute-btn {
  background: none;
  border: none;
  color: #666;
  font-size: 16px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 3px;
  transition: color 0.15s;
  outline: none;
}
#mute-btn:hover { color: #aaa; }
#mute-btn:focus-visible { box-shadow: 0 0 0 2px var(--white); }

#shape-count {
  position: absolute;
  top: 10px;
  right: 14px;
  font-size: 11px;
  font-weight: 500;
  color: #555;
  letter-spacing: 0.04em;
}

@media (max-width: 480px) {
  header { padding: 10px 14px 8px; }
  #canvas-wrap { margin: 0 12px; }
  footer { padding: 8px 14px 12px; gap: 6px; }
  .btn { padding: 8px 12px; }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Bauhaus Digital</h1>
    <span class="tagline">Art & technology are one</span>
  </header>
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="shape-count">0 shapes</div>
  </div>
  <footer>
    <div id="shape-indicator">
      <div class="dot" id="current-shape-dot"></div>
      <span class="label" id="current-shape-label">circle</span>
    </div>
    <div id="color-row">
      <button class="swatch swatch-red active" data-color="#D9381E" aria-label="Red"></button>
      <button class="swatch swatch-yellow" data-color="#F6C42E" aria-label="Yellow"></button>
      <button class="swatch swatch-blue" data-color="#1E50D9" aria-label="Blue"></button>
      <button class="swatch swatch-white" data-color="#FAFAF7" aria-label="White"></button>
      <button class="swatch swatch-black" data-color="#1A1A1A" aria-label="Black"></button>
    </div>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
      <button class="btn btn-outline" id="randomize-btn" aria-label="Random composition">Rand</button>
      <button class="btn btn-red" id="reset-btn" aria-label="Reset canvas">Reset</button>
      <button id="mute-btn" aria-label="Toggle sound">♪</button>
    </div>
  </footer>
</div>

<script>
(() => {
  "use strict";

  /* ── Audio Engine ────────────────────────────────────── */
  let audioCtx = null;
  let muted = false;
  let masterGain = null;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.22;
    masterGain.connect(audioCtx.destination);
  }

  function playNote(freq, type, duration, startDelay = 0) {
    if (!audioCtx || muted) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const t = audioCtx.currentTime + startDelay;
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.6, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(t);
    osc.stop(t + duration);
  }

  function playShapeSound(shape, xRatio) {
    if (!audioCtx || muted) return;
    if (audioCtx.state === "suspended") audioCtx.resume();
    const baseFreq = 220 + (1 - xRatio) * 440;
    const map = {
      circle:   { types: ["sine"],     durs: [0.5] },
      square:   { types: ["square"],   durs: [0.35] },
      triangle: { types: ["triangle"], durs: [0.45] },
    };
    const { types, durs } = map[shape] || map.circle;
    types.forEach((type, i) => {
      playNote(baseFreq * (i === 0 ? 1 : 1.5), type, durs[i], i * 0.02);
    });
  }

  function playResetSound(count) {
    if (!audioCtx || muted) return;
    if (audioCtx.state === "suspended") audioCtx.resume();
    const scale = [440, 392, 349.23, 329.63, 293.66, 261.63, 220, 196];
    const n = Math.min(count, scale.length);
    for (let i = 0; i < n; i++) {
      playNote(scale[i], "sine", 0.25, i * 0.045);
    }
  }

  function playRandomNote() {
    if (!audioCtx || muted) return;
    const pent = [261.63, 293.66, 329.63, 392, 440, 523.25, 587.33];
    playNote(pent[Math.floor(Math.random() * pent.length)], "triangle", 0.2, 0);
  }

  /* ── Canvas Setup ────────────────────────────────────── */
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const wrap = document.getElementById("canvas-wrap");

  let W, H, dpr;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const rect = wrap.getBoundingClientRect();
    W = rect.width;
    H = rect.height;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener("resize", () => { resize(); draw(); });

  /* ── Shapes & State ──────────────────────────────────── */
  const SHAPES = ["circle", "square", "triangle"];
  let shapeIndex = 0;
  let activeColor = "#D9381E";
  let shapes = [];
  let shapeID = 0;

  function addShape(cx, cy, type, color, size, instant = false) {
    const id = shapeID++;
    const s = {
      id, cx, cy, type, color, size,
      vx: 0, vy: 0, angle: 0,
      scale: instant ? 1 : 0,
      vScale: 0,
      opacity: instant ? 1 : 0,
      vOpacity: 0,
      born: performance.now(),
      settling: !instant,
    };
    if (!instant) {
      s.targetScale = 1;
      s.targetOpacity = 1;
    }
    shapes.push(s);
    updateCount();
    return s;
  }

  function updateCount() {
    const el = document.getElementById("shape-count");
    el.textContent = `${shapes.length} shape${shapes.length !== 1 ? "s" : ""}`;
  }

  /* ── Drawing ──────────────────────────────────────────── */
  function draw() {
    ctx.clearRect(0, 0, W, H);

    // subtle grid
    ctx.strokeStyle = "rgba(255,255,255,0.025)";
    ctx.lineWidth = 0.5;
    const step = 40;
    for (let x = step; x < W; x += step) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = step; y < H; y += step) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    for (const s of shapes) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, s.opacity));
      ctx.translate(s.cx, s.cy);
      ctx.rotate(s.angle);
      ctx.scale(s.scale, s.scale);

      // shadow
      ctx.shadowColor = "rgba(0,0,0,0.3)";
      ctx.shadowBlur = 12;
      ctx.shadowOffsetX = 3;
      ctx.shadowOffsetY = 4;

      ctx.fillStyle = s.color;
      ctx.beginPath();

      if (s.type === "circle") {
        ctx.arc(0, 0, s.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowColor = "transparent";
        ctx.strokeStyle = "rgba(0,0,0,0.12)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, s.size * 0.65, 0, Math.PI * 2);
        ctx.stroke();
      } else if (s.type === "square") {
        const hs = s.size * 0.85;
        ctx.fillRect(-hs, -hs, hs * 2, hs * 2);
        ctx.shadowColor = "transparent";
        ctx.strokeStyle = "rgba(0,0,0,0.12)";
        ctx.lineWidth = 2;
        ctx.strokeRect(-hs * 0.6, -hs * 0.6, hs * 1.2, hs * 1.2);
      } else if (s.type === "triangle") {
        const r = s.size * 1.05;
        ctx.moveTo(0, -r);
        ctx.lineTo(-r * 0.866, r * 0.5);
        ctx.lineTo(r * 0.866, r * 0.5);
        ctx.closePath();
        ctx.fill();
        ctx.shadowColor = "transparent";
        ctx.strokeStyle = "rgba(0,0,0,0.12)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        const r2 = r * 0.55;
        ctx.moveTo(0, -r2);
        ctx.lineTo(-r2 * 0.866, r2 * 0.5);
        ctx.lineTo(r2 * 0.866, r2 * 0.5);
        ctx.closePath();
        ctx.stroke();
      }

      ctx.restore();
    }
  }

  /* ── Physics / Animation ─────────────────────────────── */
  const SPRING_K = 0.12;
  const SPRING_DAMP = 0.82;

  function updatePhysics() {
    let changed = false;
    for (const s of shapes) {
      if (!s.settling) continue;
      let ds = s.targetScale - s.scale;
      s.vScale += ds * SPRING_K;
      s.vScale *= SPRING_DAMP;
      s.scale += s.vScale;
      if (Math.abs(ds) < 0.003 && Math.abs(s.vScale) < 0.001) {
        s.scale = s.targetScale;
        s.settling = false;
      }

      let diffO = s.targetOpacity - s.opacity;
      s.vOpacity += diffO * 0.1;
      s.vOpacity *= 0.8;
      s.opacity += s.vOpacity;
      if (Math.abs(diffO) < 0.01 && Math.abs(s.vOpacity) < 0.001) {
        s.opacity = s.targetOpacity;
      }

      // gentle rotation settling
      s.angle += s.vScale * 0.15;
      if (Math.abs(s.vScale) < 0.005) s.angle = 0;

      changed = true;
    }
    if (changed) draw();
  }

  let rafId;
  function loop() {
    updatePhysics();
    rafId = requestAnimationFrame(loop);
  }

  /* ── Collapse Animation (Reset) ──────────────────────── */
  let collapsing = false;

  function collapseShapes() {
    if (collapsing || !shapes.length) return;
    collapsing = true;
    playResetSound(shapes.length);

    for (let i = shapes.length - 1; i >= 0; i--) {
      const s = shapes[i];
      s.settling = false;
      s.targetScale = 0;
      s.targetOpacity = 0;
      s.angle = (Math.random() - 0.5) * 0.3;
      s.vy = -3 - Math.random() * 4;
      s.vx = (Math.random() - 0.5) * 6;
      s._cvScale = 0;
    }

    let startTime = performance.now();
    function fallFrame() {
      const dt = Math.max(0.5, (performance.now() - startTime) / 16);
      let done = true;
      for (const s of shapes) {
        s.vy += 0.35 * dt;
        s.cy += s.vy * dt;
        s.cx += s.vx * dt;

        // spring scale to 0
        let ds = 0 - s.scale;
        s._cvScale += ds * 0.1;
        s._cvScale *= 0.82;
        s.scale += s._cvScale;

        // opacity fade
        s.opacity = Math.max(0, s.opacity - 0.025 * dt);

        if (Math.abs(s.scale) > 0.003 || s.opacity > 0.01) done = false;
      }
      draw();
      if (!done) {
        requestAnimationFrame(fallFrame);
      } else {
        shapes = [];
        collapsing = false;
        updateCount();
        draw();
      }
    }
    requestAnimationFrame(fallFrame);
  }

  /* ── Random Composition ───────────────────────────────── */
  let randomizing = false;

  function randomComposition() {
    if (randomizing) return;
    randomizing = true;
    collapseShapes();

    const check = setInterval(() => {
      if (!collapsing) {
        clearInterval(check);
        const count = 5 + Math.floor(Math.random() * 10);
        const colors = ["#D9381E", "#F6C42E", "#1E50D9", "#FAFAF7", "#1A1A1A"];
        const pad = 30;

        for (let i = 0; i < count; i++) {
          const x = pad + Math.random() * (W - pad * 2);
          const y = pad + Math.random() * (H - pad * 2);
          const size = 18 + Math.random() * 45;
          const type = SHAPES[Math.floor(Math.random() * SHAPES.length)];
          const color = colors[Math.floor(Math.random() * colors.length)];
          setTimeout(() => {
            addShape(x, y, type, color, size);
            playRandomNote();
          }, i * 100);
        }
        randomizing = false;
      }
    }, 60);
  }

  /* ── Input Handling ────────────────────────────────────── */
  function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: clientX - rect.left,
      y: clientY - rect.top,
    };
  }

  canvas.addEventListener("pointerdown", (e) => {
    initAudio();
    if (collapsing || randomizing) return;
    const { x, y } = getCanvasPos(e);
    const type = SHAPES[shapeIndex];
    const size = 20 + Math.random() * 30;
    addShape(x, y, type, activeColor, size);
    playShapeSound(type, y / H);

    shapeIndex = (shapeIndex + 1) % SHAPES.length;
    updateShapeIndicator();
  });

  canvas.addEventListener("contextmenu", (e) => {
    e.preventDefault();
  });

  /* ── UI Bindings ─────────────────────────────────────── */
  function updateShapeIndicator() {
    const dot = document.getElementById("current-shape-dot");
    const label = document.getElementById("current-shape-label");
    const type = SHAPES[shapeIndex];
    label.textContent = type;
    if (type === "circle") {
      dot.style.borderRadius = "50%";
    } else if (type === "square") {
      dot.style.borderRadius = "3px";
    } else {
      dot.style.borderRadius = "2px";
    }
    dot.style.background = activeColor;
  }

  document.querySelectorAll(".swatch").forEach(el => {
    el.addEventListener("click", () => {
      document.querySelector(".swatch.active").classList.remove("active");
      el.classList.add("active");
      activeColor = el.dataset.color;
      updateShapeIndicator();
    });
  });

  document.getElementById("reset-btn").addEventListener("click", collapseShapes);
  document.getElementById("randomize-btn").addEventListener("click", randomComposition);

  const muteBtn = document.getElementById("mute-btn");
  muteBtn.addEventListener("click", () => {
    muted = !muted;
    muteBtn.textContent = muted ? "\u2716" : "\u266A";
    muteBtn.setAttribute("aria-label", muted ? "Unmute" : "Mute");
  });

  /* ── Keyboard Accessibility ──────────────────────────── */
  document.addEventListener("keydown", (e) => {
    if (e.key === "r" || e.key === "R") collapseShapes();
    if (e.key === " ") { e.preventDefault(); randomComposition(); }
    if (e.key === "m" || e.key === "M") muteBtn.click();
  });

  /* ── Init ────────────────────────────────────────────── */
  resize();
  updateShapeIndicator();
  draw();
  loop();

})();
</script>
</body>
</html>
