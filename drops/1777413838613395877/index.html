<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Bauhaus Digital — click to compose geometric forms with procedural sound. Art and technology are one.">
<title>Bauhaus Digital — Compose</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --red: #D9381E;
  --yellow: #F6C42E;
  --blue: #1E50D9;
  --black: #1A1A1A;
  --white: #FAFAF7;
  --grey: #E8E6E1;
  --canvas-bg: #181818;
  --canvas-grid: rgba(255,255,255,0.018);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulseHint {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.65; }
}

@keyframes ringExpand {
  0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0.7; }
  100% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
}

@keyframes shimmerSweep {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

@keyframes completionPulse {
  0% { opacity: 0; }
  20% { opacity: 1; }
  80% { opacity: 1; }
  100% { opacity: 0; }
}

@keyframes bannerSlide {
  from { transform: translateX(-50%) translateY(12px); opacity: 0; }
  to { transform: translateX(-50%) translateY(0); opacity: 1; }
}

@keyframes shapePlace {
  0% { transform: scale(0) rotate(-15deg); opacity: 0; }
  55% { transform: scale(1.1) rotate(2deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--black);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-user-select: none;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 900px;
  margin: 0 auto;
  animation: fadeIn 0.8s ease forwards;
}

/* ── Header ── */
header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 14px 20px 8px;
  flex-shrink: 0;
}

header h1 {
  font-size: clamp(13px, 2.5vw, 16px);
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--white);
}

header h1 span.h-r { color: var(--red); }
header h1 span.h-y { color: var(--yellow); }
header h1 span.h-b { color: var(--blue); }

header .tagline {
  font-size: clamp(9px, 1.6vw, 11px);
  font-weight: 400;
  letter-spacing: 0.08em;
  color: #555;
  text-transform: uppercase;
}

/* ── Canvas Area ── */
#canvas-wrap {
  flex: 1;
  position: relative;
  margin: 0 20px;
  border-radius: 3px;
  overflow: hidden;
  min-height: 0;
  cursor: crosshair;
  background: var(--canvas-bg);
  box-shadow: inset 0 0 40px rgba(0,0,0,0.4);
}

#canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* ── Hint Overlay ── */
#hint-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 5;
  transition: opacity 0.6s ease;
}

#hint-overlay.fade-out { opacity: 0; }

#hint-overlay .hint-main {
  font-size: clamp(13px, 2.8vw, 17px);
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--white);
  animation: pulseHint 2.2s ease-in-out infinite;
}

#hint-overlay .hint-sub {
  font-size: clamp(8px, 1.4vw, 10px);
  color: #444;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 6px;
}

/* ── Shockwave ── */
.shockwave {
  position: absolute;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid;
  pointer-events: none;
  animation: ringExpand 0.55s ease-out forwards;
  z-index: 3;
  transform: translate(-50%, -50%);
}

/* ── Completion Flash ── */
#completion-flash {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 10;
  opacity: 0;
  animation: none;
}

#completion-flash.active {
  animation: completionPulse 1.6s ease forwards;
  background: var(--white);
}

/* ── Completion Banner ── */
#completion-banner {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--white);
  background: var(--red);
  padding: 7px 20px;
  border-radius: 2px;
  pointer-events: none;
  z-index: 8;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}

#completion-banner.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Shape Count ── */
#shape-count {
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 10px;
  font-weight: 500;
  color: #3a3a3a;
  letter-spacing: 0.04em;
  z-index: 2;
  font-variant-numeric: tabular-nums;
}

/* ── Footer ── */
footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 20px 13px;
  flex-shrink: 0;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  font-family: inherit;
  font-size: clamp(10px, 1.8vw, 12px);
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: none;
  border-radius: 2px;
  padding: 9px 16px;
  cursor: pointer;
  transition: transform 0.1s ease, filter 0.1s ease, background 0.15s ease;
  outline: none;
}

.btn:active { transform: scale(0.95); filter: brightness(0.88); }
.btn:focus-visible { box-shadow: 0 0 0 2px var(--white); }

.btn-red { background: var(--red); color: var(--white); }
.btn-yellow { background: var(--yellow); color: var(--black); }
.btn-blue { background: var(--blue); color: var(--white); }
.btn-outline {
  background: transparent;
  color: #777;
  border: 1.5px solid #3a3a3a;
}
.btn-outline:hover { border-color: #555; color: #aaa; }
.btn-outline:disabled { opacity: 0.3; cursor: default; }
.btn-composer {
  background: transparent;
  color: #4a4a4a;
  border: 1.5px solid #2a2a2a;
  font-size: clamp(9px, 1.5vw, 10px);
}
.btn-composer:hover { color: #888; border-color: #444; }

/* ── Shape Indicator ── */
#shape-indicator {
  display: flex;
  align-items: center;
  gap: 7px;
}

#shape-indicator .dot {
  width: 11px; height: 11px;
  border-radius: 50%;
  transition: background 0.2s, border-radius 0.3s;
}

#shape-indicator .label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #555;
}

/* ── Color Row ── */
#color-row {
  display: flex;
  gap: 5px;
  align-items: center;
}

.swatch {
  width: 21px; height: 21px;
  border-radius: 2px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: border-color 0.12s, transform 0.12s;
  outline: none;
}
.swatch:hover { transform: scale(1.1); }
.swatch.active { border-color: var(--white); transform: scale(1.12); }
.swatch:focus-visible { box-shadow: 0 0 0 2px var(--white); }
.swatch-red { background: var(--red); }
.swatch-yellow { background: var(--yellow); }
.swatch-blue { background: var(--blue); }
.swatch-white { background: var(--white); }
.swatch-black { background: var(--black); border: 2px solid #3a3a3a; }
.swatch-black.active { border-color: var(--white); }

/* ── Mute Button ── */
#mute-btn {
  background: none;
  border: none;
  color: #555;
  font-size: 15px;
  cursor: pointer;
  padding: 4px 7px;
  border-radius: 2px;
  transition: color 0.15s;
  outline: none;
}
#mute-btn:hover { color: #999; }
#mute-btn:focus-visible { box-shadow: 0 0 0 2px var(--white); }

/* ── Mobile Responsive ── */
@media (max-width: 480px) {
  header { padding: 10px 12px 6px; }
  #canvas-wrap { margin: 0 10px; }
  footer { padding: 7px 12px 10px; gap: 5px; }
  .btn { padding: 7px 11px; }
  .swatch { width: 18px; height: 18px; }
  .btn-composer { display: none; }
}

@media (max-width: 360px) {
  #color-row { gap: 3px; }
  .swatch { width: 16px; height: 16px; }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1><span class="h-r">B</span><span class="h-y">a</span><span class="h-b">u</span>haus Digital</h1>
    <span class="tagline">Art &amp; technology are one</span>
  </header>
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="shape-count">0 / 24</div>
    <div id="hint-overlay">
      <div class="hint-main">Click anywhere to compose</div>
      <div class="hint-sub">Each shape has a voice</div>
    </div>
    <div id="completion-flash"></div>
    <div id="completion-banner">Composition complete</div>
  </div>
  <footer>
    <div id="shape-indicator">
      <div class="dot" id="current-shape-dot"></div>
      <span class="label" id="current-shape-label">circle</span>
    </div>
    <div id="color-row">
      <button class="swatch swatch-red active" data-color="#D9381E" aria-label="Red"></button>
      <button class="swatch swatch-yellow" data-color="#F6C42E" aria-label="Yellow"></button>
      <button class="swatch swatch-blue" data-color="#1E50D9" aria-label="Blue"></button>
      <button class="swatch swatch-white" data-color="#FAFAF7" aria-label="White"></button>
      <button class="swatch swatch-black" data-color="#1A1A1A" aria-label="Black"></button>
    </div>
    <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;">
      <a href="composer.html" class="btn btn-composer" aria-label="Grid Composer">Grid</a>
      <button class="btn btn-outline" id="play-btn" aria-label="Play composition" disabled>Play</button>
      <button class="btn btn-outline" id="randomize-btn" aria-label="Random composition">Rand</button>
      <button class="btn btn-red" id="reset-btn" aria-label="Reset canvas">Reset</button>
      <button id="mute-btn" aria-label="Toggle sound">&#9838;</button>
    </div>
  </footer>
</div>

<script>
(() => {
  "use strict";

  const MAX_SHAPES = 24;
  const COLOR_FREQ = {
    "#D9381E": 261.63,
    "#F6C42E": 329.63,
    "#1E50D9": 392,
    "#FAFAF7": 440,
    "#1A1A1A": 523.25
  };

  /* ── Audio Engine ───────────────────────────────────── */
  let audioCtx = null;
  let muted = false;
  let masterGain = null;

  function initAudio() {
    if (audioCtx) {
      if (audioCtx.state === "suspended") audioCtx.resume();
      return;
    }
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.22;
    masterGain.connect(audioCtx.destination);
  }

  // Rich tone with fundamentals + harmonics + subtle noise
  function playNote(freq, type, duration, delay, vol) {
    if (!audioCtx || muted) return;
    const t = audioCtx.currentTime + (delay || 0);
    const v = vol || 0.5;

    // Fundamental
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(v, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(t);
    osc.stop(t + duration + 0.02);

    // Sub-octave layer for warmth
    const osc2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    osc2.type = "sine";
    osc2.frequency.setValueAtTime(freq * 0.5, t);
    g2.gain.setValueAtTime(0, t);
    g2.gain.linearRampToValueAtTime(v * 0.15, t + 0.01);
    g2.gain.exponentialRampToValueAtTime(0.001, t + duration * 0.9);
    osc2.connect(g2);
    g2.connect(masterGain);
    osc2.start(t);
    osc2.stop(t + duration + 0.02);
  }

  // Placement sound: layered based on shape and vertical position
  function playPlaceSound(shape, color, yRatio) {
    if (!audioCtx || muted) return;
    if (audioCtx.state === "suspended") audioCtx.resume();
    const base = COLOR_FREQ[color] || 261.63;

    // Position-aware pitch: higher on canvas = lower pitch (inverted y)
    const pitchMod = 1 + (1 - yRatio) * 0.3;
    const freq = base * pitchMod;

    const cfg = {
      circle:   { wave: "sine",      harmRatio: 2, harmVol: 0.18, dur: 0.55 },
      square:   { wave: "triangle",   harmRatio: 3, harmVol: 0.12, dur: 0.42 },
      triangle: { wave: "sawtooth",   harmRatio: 1.5, harmVol: 0.1,  dur: 0.5 }
    }[shape] || { wave: "sine", harmRatio: 2, harmVol: 0.15, dur: 0.5 };

    // Fundamental
    playNote(freq, cfg.wave, cfg.dur, 0, 0.45);
    // Fifth harmonic
    playNote(freq * 1.498, "sine", cfg.dur * 0.8, 0.005, 0.12);
    // Octave shimmer
    playNote(freq * 2, "sine", cfg.dur * 0.6, 0.015, cfg.harmVol);

    // Transient click — subtle percussive texture
    const now = audioCtx.currentTime;
    const bufLen = Math.floor(audioCtx.sampleRate * 0.02);
    const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufLen * 0.15));
    }
    const noise = audioCtx.createBufferSource();
    const ng = audioCtx.createGain();
    noise.buffer = buf;
    ng.gain.setValueAtTime(0.06, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    noise.connect(ng);
    ng.connect(masterGain);
    noise.start(now);
  }

  function playResetSound() {
    if (!audioCtx || muted) return;
    const now = audioCtx.currentTime;
    [392, 293.66, 220].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(freq, now + i * 0.08);
      g.gain.setValueAtTime(0, now + i * 0.08);
      g.gain.linearRampToValueAtTime(0.06, now + i * 0.08 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.2);
      osc.connect(g); g.connect(masterGain);
      osc.start(now + i * 0.08);
      osc.stop(now + i * 0.08 + 0.22);
    });
  }

  function playCompletionFanfare() {
    if (!audioCtx || muted) return;
    const now = audioCtx.currentTime;

    // Ascending chord — C major with color mapping
    const chord = [261.63, 329.63, 392, 523.25, 659.25, 783.99];
    chord.forEach((freq, i) => {
      const t = now + i * 0.06;
      // Main voice
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.08, t + 0.012);
      g.gain.setValueAtTime(0.08, t + 0.8);
      g.gain.exponentialRampToValueAtTime(0.001, t + 2.8);
      osc.connect(g); g.connect(masterGain);
      osc.start(t); osc.stop(t + 2.9);

      // Fifth harmony
      const osc2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      osc2.type = "triangle";
      osc2.frequency.setValueAtTime(freq * 1.5, t + 0.02);
      g2.gain.setValueAtTime(0, t + 0.02);
      g2.gain.linearRampToValueAtTime(0.035, t + 0.04);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 2.2);
      osc2.connect(g2); g2.connect(masterGain);
      osc2.start(t + 0.02); osc2.stop(t + 2.3);
    });

    // Sub bass
    const bass = audioCtx.createOscillator();
    const bg = audioCtx.createGain();
    bass.type = "sine";
    bass.frequency.setValueAtTime(65.41, now);
    bg.gain.setValueAtTime(0, now);
    bg.gain.linearRampToValueAtTime(0.1, now + 0.1);
    bg.gain.setValueAtTime(0.1, now + 1.5);
    bg.gain.exponentialRampToValueAtTime(0.001, now + 3);
    bass.connect(bg); bg.connect(masterGain);
    bass.start(now); bass.stop(now + 3.1);

    // High shimmer
    const shimmer = audioCtx.createOscillator();
    const sg = audioCtx.createGain();
    shimmer.type = "sine";
    shimmer.frequency.setValueAtTime(1568, now + 0.4);
    sg.gain.setValueAtTime(0, now + 0.4);
    sg.gain.linearRampToValueAtTime(0.02, now + 0.6);
    sg.gain.exponentialRampToValueAtTime(0.001, now + 2);
    shimmer.connect(sg); sg.connect(masterGain);
    shimmer.start(now + 0.4); shimmer.stop(now + 2.1);
  }

  function playPlaySequenceSound(shape, color, yRatio) {
    if (!audioCtx || muted) return;
    const base = COLOR_FREQ[color] || 261.63;
    const freq = base + (1 - yRatio) * 120;
    const wave = shape === "circle" ? "sine" : shape === "square" ? "triangle" : "sawtooth";

    playNote(freq, wave, 0.25, 0, 0.35);
    playNote(freq * 2, "sine", 0.18, 0.005, 0.08);
  }

  function playRandomNote() {
    if (!audioCtx || muted) return;
    const pent = [261.63, 293.66, 329.63, 392, 440, 523.25, 587.33];
    playNote(pent[Math.floor(Math.random() * pent.length)], "triangle", 0.3, 0, 0.25);
  }

  function playSwatchClick() {
    if (!audioCtx || muted) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(880, now);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.04, now + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    osc.connect(g); g.connect(masterGain);
    osc.start(now); osc.stop(now + 0.1);
  }

  /* ── Canvas Setup ─────────────────────────────────── */
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const wrap = document.getElementById("canvas-wrap");

  let W, H, dpr;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const rect = wrap.getBoundingClientRect();
    W = rect.width;
    H = rect.height;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener("resize", () => { resize(); draw(); });

  /* ── Shockwave Effect ─────────────────────────────── */
  function spawnShockwave(x, y, color) {
    const ring = document.createElement("div");
    ring.className = "shockwave";
    ring.style.left = x + "px";
    ring.style.top = y + "px";
    ring.style.borderColor = color;
    wrap.appendChild(ring);
    ring.addEventListener("animationend", () => ring.remove());
  }

  /* ── Hint Overlay ─────────────────────────────────── */
  const hintOverlay = document.getElementById("hint-overlay");
  function dismissHint() {
    if (hintOverlay) {
      hintOverlay.classList.add("fade-out");
      setTimeout(() => { if (hintOverlay.parentNode) hintOverlay.remove(); }, 700);
    }
  }

  /* ── Shapes & State ───────────────────────────────── */
  const SHAPES = ["circle", "square", "triangle"];
  let shapeIndex = 0;
  let activeColor = "#D9381E";
  let shapes = [];
  let shapeID = 0;
  let completed = false;

  function addShape(cx, cy, type, color, size, instant) {
    if (shapes.length >= MAX_SHAPES && instant !== true) {
      showCompletionBanner();
      return null;
    }
    const id = shapeID++;
    const s = {
      id, cx, cy, type, color, size,
      vx: 0, vy: 0, angle: 0,
      scale: (instant !== false) ? 1 : 0,
      vScale: 0,
      opacity: (instant !== false) ? 1 : 0,
      vOpacity: 0,
      born: performance.now(),
      settling: instant === false,
    };
    if (instant === false) {
      s.targetScale = 1;
      s.targetOpacity = 1;
    }
    shapes.push(s);
    updateCount();
    return s;
  }

  function showCompletionBanner() {
    if (completed) return;
    completed = true;
    playCompletionFanfare();

    const flash = document.getElementById("completion-flash");
    flash.classList.add("active");
    setTimeout(() => flash.classList.remove("active"), 1800);

    const banner = document.getElementById("completion-banner");
    setTimeout(() => banner.classList.add("visible"), 400);
    setTimeout(() => banner.classList.remove("visible"), 3500);
    setTimeout(() => { completed = false; }, 4200);
  }

  function updateCount() {
    const el = document.getElementById("shape-count");
    el.textContent = `${shapes.length} / ${MAX_SHAPES}`;
    const playBtn = document.getElementById("play-btn");
    if (playBtn) playBtn.disabled = shapes.length === 0;
  }

  /* ── Drawing ──────────────────────────────────────── */
  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Background gradient — subtle radial from center
    const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
    grad.addColorStop(0, "rgba(30,30,30,1)");
    grad.addColorStop(1, "rgba(20,20,20,1)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Grid — slightly warmer and more visible
    ctx.strokeStyle = "rgba(255,255,255,0.025)";
    ctx.lineWidth = 0.5;
    const step = 40;
    for (let x = step; x < W; x += step) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = step; y < H; y += step) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // Intersection dots
    ctx.fillStyle = "rgba(255,255,255,0.04)";
    for (let x = 0; x < W; x += step) {
      for (let y = 0; y < H; y += step) {
        ctx.beginPath();
        ctx.arc(x, y, 1, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (const s of shapes) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, s.opacity));
      ctx.translate(s.cx, s.cy);
      ctx.rotate(s.angle);
      ctx.scale(s.scale, s.scale);

      // Soft shadow
      ctx.shadowColor = "rgba(0,0,0,0.3)";
      ctx.shadowBlur = 12;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 3;

      ctx.fillStyle = s.color;
      ctx.beginPath();

      if (s.type === "circle") {
        ctx.arc(0, 0, s.size, 0, Math.PI * 2);
        ctx.fill();
        // Inner ring
        ctx.shadowColor = "transparent";
        ctx.strokeStyle = "rgba(0,0,0,0.08)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(0, 0, s.size * 0.55, 0, Math.PI * 2);
        ctx.stroke();
        // Highlight
        ctx.fillStyle = "rgba(255,255,255,0.06)";
        ctx.beginPath();
        ctx.arc(-s.size * 0.2, -s.size * 0.2, s.size * 0.18, 0, Math.PI * 2);
        ctx.fill();
      } else if (s.type === "square") {
        const hs = s.size * 0.82;
        ctx.fillRect(-hs, -hs, hs * 2, hs * 2);
        // Inner square
        ctx.shadowColor = "transparent";
        ctx.strokeStyle = "rgba(0,0,0,0.08)";
        ctx.lineWidth = 1.5;
        ctx.strokeRect(-hs * 0.55, -hs * 0.55, hs * 1.1, hs * 1.1);
        // Highlight
        ctx.fillStyle = "rgba(255,255,255,0.05)";
        ctx.fillRect(-hs + 2, -hs + 2, hs * 0.5, hs * 0.5);
      } else if (s.type === "triangle") {
        const r = s.size * 1.05;
        ctx.moveTo(0, -r);
        ctx.lineTo(-r * 0.866, r * 0.5);
        ctx.lineTo(r * 0.866, r * 0.5);
        ctx.closePath();
        ctx.fill();
        // Inner triangle
        ctx.shadowColor = "transparent";
        ctx.strokeStyle = "rgba(0,0,0,0.08)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        const r2 = r * 0.45;
        ctx.moveTo(0, -r2);
        ctx.lineTo(-r2 * 0.866, r2 * 0.5);
        ctx.lineTo(r2 * 0.866, r2 * 0.5);
        ctx.closePath();
        ctx.stroke();
      }

      ctx.restore();
    }

    // Highlight ring for playing shape
    if (highlightShape) {
      const hs = highlightShape;
      ctx.save();
      ctx.strokeStyle = hs.color;
      ctx.globalAlpha = 0.3;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(hs.cx, hs.cy, hs.size * 1.5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

  /* ── Physics / Animation ──────────────────────────── */
  const SPRING_K = 0.14;
  const SPRING_DAMP = 0.82;

  function updatePhysics() {
    let changed = false;
    for (const s of shapes) {
      if (!s.settling) continue;
      let ds = s.targetScale - s.scale;
      s.vScale += ds * SPRING_K;
      s.vScale *= SPRING_DAMP;
      s.scale += s.vScale;
      if (Math.abs(ds) < 0.003 && Math.abs(s.vScale) < 0.001) {
        s.scale = s.targetScale;
        s.settling = false;
      }

      let diffO = s.targetOpacity - s.opacity;
      s.vOpacity += diffO * 0.12;
      s.vOpacity *= 0.78;
      s.opacity += s.vOpacity;
      if (Math.abs(diffO) < 0.01 && Math.abs(s.vOpacity) < 0.001) {
        s.opacity = s.targetOpacity;
      }

      s.angle += s.vScale * 0.12;
      if (Math.abs(s.vScale) < 0.005) s.angle = 0;

      changed = true;
    }
    if (changed) draw();
  }

  let rafId;
  function loop() {
    updatePhysics();
    rafId = requestAnimationFrame(loop);
  }

  /* ── Collapse Animation (Reset) ───────────────────── */
  let collapsing = false;

  function collapseShapes() {
    if (collapsing || !shapes.length) return;
    collapsing = true;
    completed = false;
    playResetSound();
    document.getElementById("completion-banner").classList.remove("visible");

    for (let i = shapes.length - 1; i >= 0; i--) {
      const s = shapes[i];
      s.settling = false;
      s.targetScale = 0;
      s.targetOpacity = 0;
      s.angle = (Math.random() - 0.5) * 0.5;
      s.vy = -2.5 - Math.random() * 3;
      s.vx = (Math.random() - 0.5) * 5;
      s._cvScale = 0;
    }

    let startTime = performance.now();
    function fallFrame() {
      const dt = Math.max(0.5, (performance.now() - startTime) / 16);
      let done = true;
      for (const s of shapes) {
        s.vy += 0.3 * dt;
        s.cy += s.vy * dt;
        s.cx += s.vx * dt;

        let ds = 0 - s.scale;
        s._cvScale += ds * 0.1;
        s._cvScale *= 0.82;
        s.scale += s._cvScale;

        s.opacity = Math.max(0, s.opacity - 0.02 * dt);

        if (Math.abs(s.scale) > 0.003 || s.opacity > 0.01) done = false;
      }
      draw();
      if (!done) {
        requestAnimationFrame(fallFrame);
      } else {
        shapes = [];
        collapsing = false;
        updateCount();
        draw();
      }
    }
    requestAnimationFrame(fallFrame);
  }

  /* ── Play Sequence ────────────────────────────────── */
  let isPlaying = false;
  let highlightShape = null;

  function playSequence() {
    if (isPlaying || !shapes.length) return;
    isPlaying = true;
    const playBtn = document.getElementById("play-btn");
    if (playBtn) playBtn.disabled = true;

    const sorted = shapes.map((s, i) => ({ s, birthOrder: i }));
    sorted.sort((a, b) => {
      const da = (a.s.cy / H) + (a.s.cx / W);
      const db = (b.s.cy / H) + (b.s.cx / W);
      const diff = da - db;
      return diff !== 0 ? diff : a.birthOrder - b.birthOrder;
    });

    const baseDelay = Math.max(70, Math.min(160, 2200 / shapes.length));

    sorted.forEach(({ s: shape, birthOrder }, order) => {
      setTimeout(() => {
        // Fade out then pop back in
        shape.opacity = 0;
        shape.scale = 0.25;
        shape.settling = true;
        shape.targetScale = 1;
        shape.targetOpacity = 1;
        draw();

        highlightShape = shape;
        draw();

        playPlaySequenceSound(shape.type, shape.color, shape.cy / H);

        const hideHighlight = setTimeout(() => {
          highlightShape = null;
          draw();
        }, 160);

        if (order === sorted.length - 1) {
          setTimeout(() => {
            isPlaying = false;
            if (playBtn) playBtn.disabled = false;
            // Resolution chord
            if (audioCtx && !muted) {
              [261.63, 329.63, 392, 523.25].forEach((f, fi) => {
                playNote(f, "sine", 0.9, fi * 0.06, 0.07);
              });
            }
          }, baseDelay);
        }
      }, order * baseDelay);
    });
  }

  /* ── Random Composition ───────────────────────────── */
  let randomizing = false;

  function randomComposition() {
    if (randomizing) return;
    randomizing = true;
    initAudio();
    if (shapes.length) {
      collapseShapes();
    } else {
      doRandomPlacement();
    }

    if (shapes.length > 0) {
      const check = setInterval(() => {
        if (!collapsing) {
          clearInterval(check);
          doRandomPlacement();
        }
      }, 60);
    }
  }

  function doRandomPlacement() {
    const count = 6 + Math.floor(Math.random() * (MAX_SHAPES - 5));
    const colors = ["#D9381E", "#F6C42E", "#1E50D9", "#FAFAF7", "#1A1A1A"];
    const pad = 30;

    for (let i = 0; i < count; i++) {
      const x = pad + Math.random() * (W - pad * 2);
      const y = pad + Math.random() * (H - pad * 2);
      const size = 18 + Math.random() * 42;
      const type = SHAPES[Math.floor(Math.random() * SHAPES.length)];
      const color = colors[Math.floor(Math.random() * colors.length)];
      setTimeout(() => {
        addShape(x, y, type, color, size, true);
        playRandomNote();
        spawnShockwave(x, y, color);
      }, i * 75);
    }
    setTimeout(() => {
      if (shapes.length >= MAX_SHAPES) showCompletionBanner();
      randomizing = false;
    }, count * 75 + 400);
  }

  /* ── Input Handling ───────────────────────────────── */
  function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: clientX - rect.left,
      y: clientY - rect.top,
    };
  }

  canvas.addEventListener("pointerdown", (e) => {
    initAudio();
    if (collapsing || randomizing || isPlaying) return;
    dismissHint();
    const { x, y } = getCanvasPos(e);
    const type = SHAPES[shapeIndex];
    const size = 22 + Math.random() * 28;
    const s = addShape(x, y, type, activeColor, size, false);
    if (s) {
      playPlaceSound(type, activeColor, y / H);
      spawnShockwave(x, y, activeColor);
    }

    shapeIndex = (shapeIndex + 1) % SHAPES.length;
    updateShapeIndicator();
  });

  canvas.addEventListener("contextmenu", (e) => { e.preventDefault(); });

  /* ── UI Bindings ──────────────────────────────────── */
  function updateShapeIndicator() {
    const dot = document.getElementById("current-shape-dot");
    const label = document.getElementById("current-shape-label");
    const type = SHAPES[shapeIndex];
    label.textContent = type;
    dot.style.borderRadius = type === "circle" ? "50%" : type === "square" ? "2px" : "2px";
    dot.style.background = activeColor;
    if (type === "triangle") {
      dot.style.width = "0";
      dot.style.height = "0";
      dot.style.background = "none";
      dot.style.borderLeft = "5.5px solid transparent";
      dot.style.borderRight = "5.5px solid transparent";
      dot.style.borderBottom = "11px solid " + activeColor;
    } else {
      dot.style.borderLeft = "";
      dot.style.borderRight = "";
      dot.style.borderBottom = "";
      dot.style.width = "11px";
      dot.style.height = "11px";
    }
  }

  document.querySelectorAll(".swatch").forEach(el => {
    el.addEventListener("click", () => {
      document.querySelector(".swatch.active")?.classList.remove("active");
      el.classList.add("active");
      activeColor = el.dataset.color;
      updateShapeIndicator();
      initAudio();
      playSwatchClick();
    });
  });

  document.getElementById("reset-btn").addEventListener("click", () => { initAudio(); collapseShapes(); });
  document.getElementById("randomize-btn").addEventListener("click", randomComposition);
  document.getElementById("play-btn").addEventListener("click", () => { initAudio(); playSequence(); });

  const muteBtn = document.getElementById("mute-btn");
  muteBtn.addEventListener("click", () => {
    muted = !muted;
    muteBtn.textContent = muted ? "\u2716" : "\u266A";
    muteBtn.setAttribute("aria-label", muted ? "Unmute" : "Mute");
  });

  /* ── Keyboard Accessibility ──────────────────────── */
  document.addEventListener("keydown", (e) => {
    if (e.key === "r" || e.key === "R") { initAudio(); collapseShapes(); }
    if (e.key === " ") { e.preventDefault(); initAudio(); randomComposition(); }
    if (e.key === "m" || e.key === "M") muteBtn.click();
    if (e.key === "p" || e.key === "P") { initAudio(); playSequence(); }
    // Tab through shapes with 1, 2, 3
    if (e.key === "1") { shapeIndex = 0; updateShapeIndicator(); }
    if (e.key === "2") { shapeIndex = 1; updateShapeIndicator(); }
    if (e.key === "3") { shapeIndex = 2; updateShapeIndicator(); }
  });

  /* ── Cursor preview ──────────────────────────────── */
  // Draw shape preview under cursor while on canvas
  canvas.addEventListener("pointermove", (e) => {
    if (collapsing || randomizing || isPlaying) { draw(); return; }
    const { x, y } = getCanvasPos(e);
    draw();
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.translate(x, y);
    const type = SHAPES[shapeIndex];
    const previewSize = 26;
    ctx.fillStyle = activeColor;
    ctx.beginPath();
    if (type === "circle") {
      ctx.arc(0, 0, previewSize, 0, Math.PI * 2);
    } else if (type === "square") {
      const hs = previewSize * 0.82;
      ctx.rect(-hs, -hs, hs * 2, hs * 2);
    } else if (type === "triangle") {
      const r = previewSize * 1.05;
      ctx.moveTo(0, -r);
      ctx.lineTo(-r * 0.866, r * 0.5);
      ctx.lineTo(r * 0.866, r * 0.5);
      ctx.closePath();
    }
    ctx.fill();
    ctx.restore();
  });

  canvas.addEventListener("pointerleave", () => { draw(); });

  /* ── Init ────────────────────────────────────────── */
  resize();
  updateShapeIndicator();
  updateCount();
  draw();
  loop();
})();
</script>
</body>
</html>
