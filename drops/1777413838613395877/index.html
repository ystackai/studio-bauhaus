<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Bauhaus Digital — click to compose geometric forms with procedural sound. Art and technology are one.">
<title>Bauhaus Digital — Click to Compose</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --red: #D9381E;
    --yellow: #F6C42E;
    --blue: #1E50D9;
    --black: #1A1A1A;
    --white: #FAFAF7;
    --grey: #E8E6E1;
    --canvas-bg: #222222;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulseHint {
  0%, 100% { opacity: 0.35; }
  50% { opacity: 0.7; }
}

@keyframes ringExpand {
  0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0.8; }
  100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
}

@keyframes shimmerSweep {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--black);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-user-select: none;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 900px;
  margin: 0 auto;
  animation: fadeIn 0.8s ease forwards;
}

header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 14px 20px 10px;
  flex-shrink: 0;
}

header h1 {
  font-size: clamp(13px, 2.5vw, 16px);
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--white);
}

header h1 span.h-r { color: var(--red); }
header h1 span.h-y { color: var(--yellow); }
header h1 span.h-b { color: var(--blue); }

header .tagline {
  font-size: clamp(10px, 1.8vw, 12px);
  font-weight: 400;
  letter-spacing: 0.06em;
  color: #666;
}

#canvas-wrap {
  flex: 1;
  position: relative;
  margin: 0 20px;
  border-radius: 4px;
  overflow: hidden;
  min-height: 0;
  cursor: crosshair;
  background: var(--canvas-bg);
}

#canvas {
  width: 100%;
  height: 100%;
  display: block;
}

#hint-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 5;
  transition: opacity 0.6s ease;
}

#hint-overlay.fade-out {
  opacity: 0;
}

#hint-overlay .hint-main {
  font-size: clamp(14px, 3vw, 18px);
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--white);
  animation: pulseHint 2s ease-in-out infinite;
}

#hint-overlay .hint-sub {
  font-size: clamp(9px, 1.6vw, 11px);
  color: #555;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 6px;
}

.shockwave {
  position: absolute;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid;
  pointer-events: none;
  animation: ringExpand 0.5s ease-out forwards;
  z-index: 3;
  transform: translate(-50%, -50%);
}

#completion-flash {
  position: absolute;
  inset: 0;
  background: rgba(250, 250, 247, 0.15);
  pointer-events: none;
  z-index: 10;
  opacity: 0;
  transition: opacity 0.15s ease;
}

#completion-flash.active {
  opacity: 1;
  transition: opacity 0.08s ease;
}

/* Mini completion banner */
#completion-banner {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--white);
  background: rgba(217, 56, 30, 0.85);
  padding: 7px 18px;
  border-radius: 3px;
  pointer-events: none;
  z-index: 8;
  opacity: 0;
  transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

#completion-banner.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px 14px;
  flex-shrink: 0;
  gap: 10px;
  flex-wrap: wrap;
}

.btn {
  font-family: inherit;
  font-size: clamp(11px, 2vw, 13px);
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: none;
  border-radius: 3px;
  padding: 10px 18px;
  cursor: pointer;
  transition: transform 0.12s ease, filter 0.12s ease, background 0.15s ease;
  outline: none;
}

.btn:active { transform: scale(0.95); filter: brightness(0.88); }
.btn:focus-visible { box-shadow: 0 0 0 2px var(--white); }

.btn-red { background: var(--red); color: var(--white); }
.btn-yellow { background: var(--yellow); color: var(--black); }
.btn-blue { background: var(--blue); color: var(--white); }
.btn-outline {
  background: transparent;
  color: #888;
  border: 1.5px solid #444;
}
.btn-outline:hover { border-color: #777; color: #aaa; }
.btn-composer {
  background: transparent;
  color: #555;
  border: 1.5px solid #333;
  font-size: clamp(10px, 1.6vw, 11px);
}
.btn-composer:hover { color: #999; border-color: #555; }

#shape-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
}

#shape-indicator .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  transition: background 0.2s, border-radius 0.2s;
}

#shape-indicator .label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #666;
}

#color-row {
  display: flex;
  gap: 6px;
  align-items: center;
}

.swatch {
  width: 22px; height: 22px;
  border-radius: 3px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s;
  outline: none;
}
.swatch.active { border-color: var(--white); transform: scale(1.15); }
.swatch:focus-visible { box-shadow: 0 0 0 2px var(--white); }
.swatch-red { background: var(--red); }
.swatch-yellow { background: var(--yellow); }
.swatch-blue { background: var(--blue); }
.swatch-white { background: var(--white); }
.swatch-black { background: var(--black); border: 2px solid #444; }
.swatch-black.active { border-color: var(--white); }

#mute-btn {
  background: none;
  border: none;
  color: #666;
  font-size: 16px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 3px;
  transition: color 0.15s;
  outline: none;
}
#mute-btn:hover { color: #aaa; }
#mute-btn:focus-visible { box-shadow: 0 0 0 2px var(--white); }

#shape-count {
  position: absolute;
  top: 10px;
  right: 14px;
  font-size: 11px;
  font-weight: 500;
  color: #444;
  letter-spacing: 0.04em;
  z-index: 2;
}

@media (max-width: 480px) {
  header { padding: 10px 14px 8px; }
  #canvas-wrap { margin: 0 12px; }
  footer { padding: 8px 14px 12px; gap: 6px; }
  .btn { padding: 8px 12px; }
}
</style>
</head>
<body>
<div id="app">
   <header>
      <h1><span class="h-r">B</span><span class="h-y">a</span><span class="h-b">u</span>haus Digital</h1>
      <span class="tagline">Art & technology are one</span>
    </header>
    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div id="shape-count">0 / 24</div>
      <div id="hint-overlay">
        <div class="hint-main">Click anywhere to compose</div>
        <div class="hint-sub">Each shape has a voice</div>
      </div>
      <div id="completion-flash"></div>
      <div id="completion-banner">Composition complete</div>
    </div>
    <footer>
      <div id="shape-indicator">
        <div class="dot" id="current-shape-dot"></div>
        <span class="label" id="current-shape-label">circle</span>
      </div>
      <div id="color-row">
        <button class="swatch swatch-red active" data-color="#D9381E" aria-label="Red"></button>
        <button class="swatch swatch-yellow" data-color="#F6C42E" aria-label="Yellow"></button>
        <button class="swatch swatch-blue" data-color="#1E50D9" aria-label="Blue"></button>
        <button class="swatch swatch-white" data-color="#FAFAF7" aria-label="White"></button>
        <button class="swatch swatch-black" data-color="#1A1A1A" aria-label="Black"></button>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
        <a href="composer.html" class="btn btn-composer" aria-label="Grid Composer">Grid</a>
        <button class="btn btn-outline" id="play-btn" aria-label="Play composition" disabled>Play</button>
        <button class="btn btn-outline" id="randomize-btn" aria-label="Random composition">Rand</button>
        <button class="btn btn-red" id="reset-btn" aria-label="Reset canvas">Reset</button>
        <button id="mute-btn" aria-label="Toggle sound">&#9838;</button>
      </div>
    </footer>
</div>

<script>
(() => {
   "use strict";

  const MAX_SHAPES = 24;
  const COLOR_FREQ = {
    "#D9381E": 261.63,
    "#F6C42E": 329.63,
    "#1E50D9": 392,
    "#FAFAF7": 440,
    "#1A1A1A": 523.25
  };

   /* ── Audio Engine ────────────────────────────────────── */
  let audioCtx = null;
  let muted = false;
  let masterGain = null;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.25;
    masterGain.connect(audioCtx.destination);
  }

  function playNote(freq, type, duration, delay, vol) {
    if (!audioCtx || muted) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const t = audioCtx.currentTime + (delay || 0);
    const v = vol || 0.5;
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(v, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(t);
    osc.stop(t + duration + 0.02);
  }

  function playPlaceSound(shape, color, yRatio) {
    if (!audioCtx || muted) return;
    if (audioCtx.state === "suspended") audioCtx.resume();
    const base = COLOR_FREQ[color] || 261.63;
    const pitchShift = 1 - yRatio;
    const freq = base + pitchShift * 200;
    const cfg = {
      circle: { wave: "sine", harm: 0.5, dur: 0.45 },
      square: { wave: "triangle", harm: 0.35, dur: 0.35 },
      triangle: { wave: "sawtooth", harm: 0.2, dur: 0.4 }
    }[shape] || { wave: "sine", harm: 0.4, dur: 0.4 };
    playNote(freq, cfg.wave, cfg.dur, 0, 0.5);
    playNote(freq * 1.5, "sine", cfg.dur * 0.7, 0.01, cfg.harm);
  }

  function playResetSound() {
    if (!audioCtx || muted) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.exponentialRampToValueAtTime(80, now + 0.25);
    g.gain.setValueAtTime(0.08, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    osc.connect(g); g.connect(masterGain);
    osc.start(now); osc.stop(now + 0.27);
  }

  function playCompletionFanfare() {
    if (!audioCtx || muted) return;
    const chord = [261.63, 329.63, 392, 523.25, 659.25, 783.99];
    chord.forEach((freq, i) => {
      playNote(freq, "sine", 1.5, i * 0.05, 0.12);
      playNote(freq * 1.5, "triangle", 1.2, i * 0.05 + 0.02, 0.05);
    });
    const bass = audioCtx.createOscillator();
    const bg = audioCtx.createGain();
    bass.type = "sine";
    bass.frequency.setValueAtTime(65.41, audioCtx.currentTime);
    bg.gain.setValueAtTime(0, audioCtx.currentTime);
    bg.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.08);
    bg.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);
    bass.connect(bg); bg.connect(masterGain);
    bass.start(); bass.stop(audioCtx.currentTime + 2.5);
  }

  function playPlaySequenceSound(shape, color, yRatio) {
    if (!audioCtx || muted) return;
    const base = COLOR_FREQ[color] || 261.63;
    const freq = base + (1 - yRatio) * 150;
    const wave = shape === "circle" ? "sine" : shape === "square" ? "triangle" : "sawtooth";
    playNote(freq, wave, 0.3, 0, 0.35);
    playNote(freq * 2, "sine", 0.2, 0.005, 0.1);
  }

  function playRandomNote() {
    if (!audioCtx || muted) return;
    const pent = [261.63, 293.66, 329.63, 392, 440, 523.25, 587.33];
    playNote(pent[Math.floor(Math.random() * pent.length)], "triangle", 0.25, 0, 0.3);
  }

   /* ── Canvas Setup ────────────────────────────────────── */
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const wrap = document.getElementById("canvas-wrap");

  let W, H, dpr;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const rect = wrap.getBoundingClientRect();
    W = rect.width;
    H = rect.height;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener("resize", () => { resize(); draw(); });

   /* ── Shockwave Effect ───────────────────────────────── */
  function spawnShockwave(x, y, color) {
    const ring = document.createElement("div");
    ring.className = "shockwave";
    ring.style.left = x + "px";
    ring.style.top = y + "px";
    ring.style.borderColor = color;
    wrap.appendChild(ring);
    ring.addEventListener("animationend", () => ring.remove());
  }

   /* ── Hint Overlay ───────────────────────────────────── */
  const hintOverlay = document.getElementById("hint-overlay");
  function dismissHint() {
    if (hintOverlay) {
      hintOverlay.classList.add("fade-out");
      setTimeout(() => { if (hintOverlay.parentNode) hintOverlay.remove(); }, 700);
    }
  }

   /* ── Shapes & State ──────────────────────────────────── */
  const SHAPES = ["circle", "square", "triangle"];
  let shapeIndex = 0;
  let activeColor = "#D9381E";
  let shapes = [];
  let shapeID = 0;
  let completed = false;

  function addShape(cx, cy, type, color, size, instant) {
    if (shapes.length >= MAX_SHAPES && !instant) {
      showCompletionBanner();
      return null;
    }
    const id = shapeID++;
    const s = {
      id, cx, cy, type, color, size,
      vx: 0, vy: 0, angle: 0,
      scale: (instant !== false) ? 1 : 0,
      vScale: 0,
      opacity: (instant !== false) ? 1 : 0,
      vOpacity: 0,
      born: performance.now(),
      settling: instant === false,
    };
    if (instant === false) {
      s.targetScale = 1;
      s.targetOpacity = 1;
    }
    shapes.push(s);
    updateCount();
    return s;
  }

  function isComplete() { return shapes.length >= MAX_SHAPES; }

  function showCompletionBanner() {
    if (completed) return;
    completed = true;
    playCompletionFanfare();
    const flash = document.getElementById("completion-flash");
    flash.classList.add("active");
    setTimeout(() => flash.classList.remove("active"), 300);
    const banner = document.getElementById("completion-banner");
    setTimeout(() => banner.classList.add("visible"), 200);
    setTimeout(() => banner.classList.remove("visible"), 3500);
    setTimeout(() => { completed = false; }, 4000);
  }

  function updateCount() {
    const el = document.getElementById("shape-count");
    el.textContent = `${shapes.length} / ${MAX_SHAPES}`;
    const playBtn = document.getElementById("play-btn");
    if (playBtn) playBtn.disabled = shapes.length === 0;
  }

   /* ── Drawing ──────────────────────────────────────────── */
  function draw() {
    ctx.clearRect(0, 0, W, H);

    // subtle grid
    ctx.strokeStyle = "rgba(255,255,255,0.02)";
    ctx.lineWidth = 0.5;
    const step = 40;
    for (let x = step; x < W; x += step) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = step; y < H; y += step) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    for (const s of shapes) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, s.opacity));
      ctx.translate(s.cx, s.cy);
      ctx.rotate(s.angle);
      ctx.scale(s.scale, s.scale);

      // shadow
      ctx.shadowColor = "rgba(0,0,0,0.35)";
      ctx.shadowBlur = 14;
      ctx.shadowOffsetX = 3;
      ctx.shadowOffsetY = 4;

      ctx.fillStyle = s.color;
      ctx.beginPath();

      if (s.type === "circle") {
        ctx.arc(0, 0, s.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowColor = "transparent";
        ctx.strokeStyle = "rgba(0,0,0,0.1)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(0, 0, s.size * 0.6, 0, Math.PI * 2);
        ctx.stroke();
      } else if (s.type === "square") {
        const hs = s.size * 0.82;
        ctx.fillRect(-hs, -hs, hs * 2, hs * 2);
        ctx.shadowColor = "transparent";
        ctx.strokeStyle = "rgba(0,0,0,0.1)";
        ctx.lineWidth = 1.5;
        ctx.strokeRect(-hs * 0.6, -hs * 0.6, hs * 1.2, hs * 1.2);
      } else if (s.type === "triangle") {
        const r = s.size * 1.05;
        ctx.moveTo(0, -r);
        ctx.lineTo(-r * 0.866, r * 0.5);
        ctx.lineTo(r * 0.866, r * 0.5);
        ctx.closePath();
        ctx.fill();
        ctx.shadowColor = "transparent";
        ctx.strokeStyle = "rgba(0,0,0,0.1)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        const r2 = r * 0.5;
        ctx.moveTo(0, -r2);
        ctx.lineTo(-r2 * 0.866, r2 * 0.5);
        ctx.lineTo(r2 * 0.866, r2 * 0.5);
        ctx.closePath();
        ctx.stroke();
      }

      ctx.restore();
    }

    // draw highlight ring for playing shape
    if (highlightShape) {
      const hs = highlightShape;
      ctx.save();
      ctx.strokeStyle = hs.color;
      ctx.globalAlpha = 0.35;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(hs.cx, hs.cy, hs.size * 1.4, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

   /* ── Physics / Animation ─────────────────────────────── */
  const SPRING_K = 0.14;
  const SPRING_DAMP = 0.82;

  function updatePhysics() {
    let changed = false;
    for (const s of shapes) {
      if (!s.settling) continue;
      let ds = s.targetScale - s.scale;
      s.vScale += ds * SPRING_K;
      s.vScale *= SPRING_DAMP;
      s.scale += s.vScale;
      if (Math.abs(ds) < 0.003 && Math.abs(s.vScale) < 0.001) {
        s.scale = s.targetScale;
        s.settling = false;
      }

      let diffO = s.targetOpacity - s.opacity;
      s.vOpacity += diffO * 0.12;
      s.vOpacity *= 0.78;
      s.opacity += s.vOpacity;
      if (Math.abs(diffO) < 0.01 && Math.abs(s.vOpacity) < 0.001) {
        s.opacity = s.targetOpacity;
      }

      s.angle += s.vScale * 0.12;
      if (Math.abs(s.vScale) < 0.005) s.angle = 0;

      changed = true;
    }
    if (changed) draw();
  }

  let rafId;
  function loop() {
    updatePhysics();
    rafId = requestAnimationFrame(loop);
  }

   /* ── Collapse Animation (Reset) ──────────────────────── */
  let collapsing = false;

  function collapseShapes() {
    if (collapsing || !shapes.length) return;
    collapsing = true;
    completed = false;
    playResetSound();
    document.getElementById("completion-banner").classList.remove("visible");

    for (let i = shapes.length - 1; i >= 0; i--) {
      const s = shapes[i];
      s.settling = false;
      s.targetScale = 0;
      s.targetOpacity = 0;
      s.angle = (Math.random() - 0.5) * 0.4;
      s.vy = -2.5 - Math.random() * 3;
      s.vx = (Math.random() - 0.5) * 5;
      s._cvScale = 0;
    }

    let startTime = performance.now();
    function fallFrame() {
      const dt = Math.max(0.5, (performance.now() - startTime) / 16);
      let done = true;
      for (const s of shapes) {
        s.vy += 0.3 * dt;
        s.cy += s.vy * dt;
        s.cx += s.vx * dt;

        let ds = 0 - s.scale;
        s._cvScale += ds * 0.1;
        s._cvScale *= 0.82;
        s.scale += s._cvScale;

        s.opacity = Math.max(0, s.opacity - 0.02 * dt);

        if (Math.abs(s.scale) > 0.003 || s.opacity > 0.01) done = false;
      }
      draw();
      if (!done) {
        requestAnimationFrame(fallFrame);
      } else {
        shapes = [];
        collapsing = false;
        updateCount();
        draw();
      }
    }
    requestAnimationFrame(fallFrame);
  }

   /* ── Play Sequence ───────────────────────────────────── */
  let isPlaying = false;
  let highlightShape = null;

  function playSequence() {
    if (isPlaying || !shapes.length) return;
    isPlaying = true;
    const playBtn = document.getElementById("play-btn");
    if (playBtn) playBtn.disabled = true;

    const sorted = shapes.map((s, i) => ({ s, birthOrder: i }));
    sorted.sort((a, b) => {
      const da = (a.s.cy / H) + (a.s.cx / W);
      const db = (b.s.cy / H) + (b.s.cx / W);
      const diff = da - db;
      return diff !== 0 ? diff : a.birthOrder - b.birthOrder;
    });

    const baseDelay = Math.max(80, Math.min(180, 2400 / shapes.length));

    sorted.forEach(({ s: shape, birthOrder }, order) => {
      setTimeout(() => {
        // Temporarily hide then show
        shape.opacity = 0;
        shape.scale = 0.3;
        shape.settling = true;
        shape.targetScale = 1;
        shape.targetOpacity = 1;
        draw();

        highlightShape = shape;
        draw();

        playPlaySequenceSound(shape.type, shape.color, shape.cy / H);

        const hideHighlight = setTimeout(() => {
          highlightShape = null;
          draw();
        }, 180);

        if (order === sorted.length - 1) {
          setTimeout(() => {
            isPlaying = false;
            if (playBtn) playBtn.disabled = false;
            // Small resolution chord
            if (audioCtx && !muted) {
              const freqs = [261.63, 329.63, 392, 523.25];
              freqs.forEach((f, i) => playNote(f, "sine", 0.8, i * 0.04, 0.08));
            }
          }, baseDelay);
        }
      }, order * baseDelay);
    });
  }

   /* ── Random Composition ───────────────────────────────── */
  let randomizing = false;

  function randomComposition() {
    if (randomizing) return;
    randomizing = true;
    initAudio();
    collapseShapes();

    const check = setInterval(() => {
      if (!collapsing) {
        clearInterval(check);
        const count = 6 + Math.floor(Math.random() * (MAX_SHAPES - 5));
        const colors = ["#D9381E", "#F6C42E", "#1E50D9", "#FAFAF7", "#1A1A1A"];
        const pad = 30;

        for (let i = 0; i < count; i++) {
          const x = pad + Math.random() * (W - pad * 2);
          const y = pad + Math.random() * (H - pad * 2);
          const size = 18 + Math.random() * 42;
          const type = SHAPES[Math.floor(Math.random() * SHAPES.length)];
          const color = colors[Math.floor(Math.random() * colors.length)];
          setTimeout(() => {
            addShape(x, y, type, color, size);
            playRandomNote();
            const rect = wrap.getBoundingClientRect();
            spawnShockwave(x, y, color);
          }, i * 80);
        }
        if (count >= MAX_SHAPES) {
          setTimeout(showCompletionBanner, count * 80 + 400);
        }
        randomizing = false;
        updateCount();
      }
    }, 60);
  }

   /* ── Input Handling ────────────────────────────────────── */
  function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: clientX - rect.left,
      y: clientY - rect.top,
    };
  }

  canvas.addEventListener("pointerdown", (e) => {
    initAudio();
    if (collapsing || randomizing || isPlaying) return;
    dismissHint();
    const { x, y } = getCanvasPos(e);
    const type = SHAPES[shapeIndex];
    const size = 22 + Math.random() * 28;
    const s = addShape(x, y, type, activeColor, size);
    if (s) {
      playPlaceSound(type, activeColor, y / H);
      spawnShockwave(x, y, activeColor);
    }

    shapeIndex = (shapeIndex + 1) % SHAPES.length;
    updateShapeIndicator();
  });

  canvas.addEventListener("contextmenu", (e) => {
    e.preventDefault();
  });

   /* ── UI Bindings ─────────────────────────────────────── */
  function updateShapeIndicator() {
    const dot = document.getElementById("current-shape-dot");
    const label = document.getElementById("current-shape-label");
    const type = SHAPES[shapeIndex];
    label.textContent = type;
    dot.style.borderRadius = type === "circle" ? "50%" : type === "square" ? "3px" : "2px";
    dot.style.background = activeColor;
  }

  document.querySelectorAll(".swatch").forEach(el => {
    el.addEventListener("click", () => {
      document.querySelector(".swatch.active").classList.remove("active");
      el.classList.add("active");
      activeColor = el.dataset.color;
      updateShapeIndicator();
      initAudio();
      playRandomNote();
    });
  });

  document.getElementById("reset-btn").addEventListener("click", collapseShapes);
  document.getElementById("randomize-btn").addEventListener("click", () => { initAudio(); randomComposition(); });
  document.getElementById("play-btn").addEventListener("click", () => { initAudio(); playSequence(); });

  const muteBtn = document.getElementById("mute-btn");
  muteBtn.addEventListener("click", () => {
    muted = !muted;
    muteBtn.textContent = muted ? "\u2716" : "\u266A";
    muteBtn.setAttribute("aria-label", muted ? "Unmute" : "Mute");
  });

   /* ── Keyboard Accessibility ──────────────────────────── */
  document.addEventListener("keydown", (e) => {
    if (e.key === "r" || e.key === "R") { initAudio(); collapseShapes(); }
    if (e.key === " ") { e.preventDefault(); initAudio(); randomComposition(); }
    if (e.key === "m" || e.key === "M") muteBtn.click();
    if (e.key === "p" || e.key === "P") { initAudio(); playSequence(); }
  });

   /* ── Init ────────────────────────────────────────────── */
  resize();
  updateShapeIndicator();
  updateCount();
  draw();
  loop();

})();
</script>
</body>
