<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bauhaus Composer — Art and Technology Are One</title>
  <style>
    :root {
      --red: #E03C2A;
      --blue: #2058C8;
      --yellow: #F0C830;
      --black: #1A1A1A;
      --white: #F5F0E8;
      --gray: #8E8E8E;
      --dark-gray: #3A3A3A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: var(--black);
      color: var(--white);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      padding: 2rem 1rem 0.5rem;
      position: relative;
    }

    .header h1 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 900;
      letter-spacing: -1px;
      text-transform: uppercase;
      line-height: 1;
    }

    .header h1 .red { color: var(--red); }
    .header h1 .blue { color: var(--blue); }
    .header h1 .yellow { color: var(--yellow); }

    .subtitle {
      font-size: 0.85rem;
      color: var(--gray);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    .composition-area {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      position: relative;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 3px;
      width: min(85vw, 540px);
      height: min(85vw, 540px);
      max-width: 540px;
      max-height: 540px;
      aspect-ratio: 1;
    }

    .cell {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .cell:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
    }

    .cell.filled {
      cursor: pointer;
    }

    .cell.filled:hover {
      transform: scale(1.05);
      z-index: 2;
    }

    .cell-content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: placeIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes placeIn {
      0% { transform: scale(0) rotate(-30deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    @keyframes removeOut {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0) rotate(20deg); opacity: 0; }
    }

    /* Shape types */
    .shape-circle {
      width: 60%;
      height: 60%;
      border-radius: 50%;
    }

    .shape-square {
      width: 55%;
      height: 55%;
    }

    .shape-triangle {
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-bottom: 38px solid;
      background: none !important;
    }

    .shape-diagonal {
      width: 100%;
      height: 100%;
    }

    .shape-diagonal::after {
      content: '';
      position: absolute;
      width: 140%;
      height: 3px;
      transform: rotate(45deg);
    }

    .shape-half {
      width: 100%;
      height: 100%;
    }

    .shape-ring {
      width: 55%;
      height: 55%;
      border-radius: 50%;
      border: 3px solid;
      background: transparent !important;
    }

    /* Color classes */
    .color-red { background-color: var(--red); }
    .color-blue { background-color: var(--blue); }
    .color-yellow { background-color: var(--yellow); }
    .color-black { background-color: var(--black); border: 1px solid var(--gray); }
    .color-white { background-color: var(--white); }

    .shape-triangle.border-red { border-bottom-color: var(--red); }
    .shape-triangle.border-blue { border-bottom-color: var(--blue); }
    .shape-triangle.border-yellow { border-bottom-color: var(--yellow); }
    .shape-triangle.border-white { border-bottom-color: var(--white); }

    .shape-diagonal::after.line-red { background: var(--red); }
    .shape-diagonal::after.line-blue { background: var(--blue); }
    .shape-diagonal::after.line-yellow { background: var(--yellow); }
    .shape-diagonal::after.line-white { background: var(--white); }

    .shape-half.half-red { background: linear-gradient(90deg, var(--red) 50%, transparent 50%); }
    .shape-half.half-blue { background: linear-gradient(90deg, var(--blue) 50%, transparent 50%); }
    .shape-half.half-yellow { background: linear-gradient(90deg, var(--yellow) 50%, transparent 50%); }

    .shape-ring.ring-red { border-color: var(--red); }
    .shape-ring.ring-blue { border-color: var(--blue); }
    .shape-ring.ring-yellow { border-color: var(--yellow); }

    /* Controls bar */
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      flex-wrap: wrap;
    }

    .palette {
      display: flex;
      gap: 0.4rem;
      align-items: center;
    }

    .palette-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s ease;
      position: relative;
    }

    .palette-swatch:hover {
      transform: scale(1.15);
    }

    .palette-swatch.active {
      border-color: var(--white);
      transform: scale(1.15);
      box-shadow: 0 0 0 2px var(--black), 0 0 0 4px var(--white);
    }

    .swatch-red { background: var(--red); }
    .swatch-blue { background: var(--blue); }
    .swatch-yellow { background: var(--yellow); }
    .swatch-black { background: var(--black); border: 1px solid var(--gray); }
    .swatch-white { background: var(--white); }

    .shapes {
      display: flex;
      gap: 0.4rem;
      align-items: center;
    }

    .shape-btn {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .shape-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .shape-btn.active {
      border-color: var(--white);
      background: rgba(255,255,255,0.15);
    }

    .shape-btn svg {
      width: 18px;
      height: 18px;
      fill: var(--white);
    }

    .action-btn {
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: all 0.15s ease;
    }

    .btn-clear {
      background: var(--red);
      color: var(--white);
    }

    .btn-clear:hover {
      background: #c43524;
    }

    .btn-play {
      background: var(--blue);
      color: var(--white);
    }

    .btn-play:hover {
      background: #1a49a8;
    }

    .btn-mute {
      background: rgba(255,255,255,0.08);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 1rem;
      padding: 0.4rem 0.6rem;
    }

    .btn-mute:hover {
      background: rgba(255,255,255,0.14);
    }

    /* Score display */
    .score {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: transparent;
      transition: background 0.3s ease;
    }

    .score-glow {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--red), var(--yellow), var(--blue));
      transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* Completion state */
    .composition-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 100;
    }

    .composition-flash.active {
      animation: flashPulse 1.5s ease forwards;
    }

    @keyframes flashPulse {
      0% { opacity: 0; background: rgba(255,255,255,0); }
      15% { opacity: 1; background: rgba(255,255,255,0.15); }
      100% { opacity: 0; background: rgba(255,255,255,0); }
    }

    /* Completion modal */
    .completion-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .completion-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .completion-card {
      text-align: center;
      padding: 2.5rem;
      background: var(--black);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      transform: scale(0.9);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .completion-overlay.visible .completion-card {
      transform: scale(1);
    }

    .completion-card h2 {
      font-size: 1.5rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }

    .completion-card p {
      color: var(--gray);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .completion-card .action-btn {
      margin: 0 0.25rem;
    }

    /* Divider */
    .divider {
      width: 3px;
      height: 24px;
      background: rgba(255,255,255,0.15);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .controls {
        gap: 0.5rem;
        padding: 0.75rem 0.5rem;
      }
      .palette-swatch, .shape-btn {
        width: 30px;
        height: 30px;
      }
      .shape-btn svg {
        width: 14px;
        height: 14px;
      }
      .action-btn {
        padding: 0.4rem 0.7rem;
        font-size: 0.7rem;
      }
      .divider { height: 20px; }
      
      .shape-triangle {
        border-left-width: 16px;
        border-right-width: 16px;
        border-bottom-width: 28px;
      }
    }

    @media (max-width: 400px) {
      .grid-container {
        gap: 2px;
      }
    }
  </style>
</head>
<body>
  <div class="score"><div class="score-glow" id="scoreGlow"></div></div>
  <div class="composition-flash" id="compFlash"></div>

  <div class="header">
    <h1>
      <span class="red">B</span><span class="blue">a</span><span class="yellow">u</span>hau<span class="red">s</span>
    </h1>
    <div class="subtitle">Geometric Composer</div>
  </div>

  <div class="composition-area">
    <div class="grid-container" id="grid" role="grid" aria-label="Bauhaus composition grid"></div>
  </div>

  <div class="controls" role="toolbar" aria-label="Composition tools">
    <div class="palette" aria-label="Color palette">
      <div class="palette-swatch swatch-red active" data-color="red" role="button" aria-label="Red" tabindex="0"></div>
      <div class="palette-swatch swatch-blue" data-color="blue" role="button" aria-label="Blue" tabindex="0"></div>
      <div class="palette-swatch swatch-yellow" data-color="yellow" role="button" aria-label="Yellow" tabindex="0"></div>
      <div class="palette-swatch swatch-white" data-color="white" role="button" aria-label="White" tabindex="0"></div>
      <div class="palette-swatch swatch-black" data-color="black" role="button" aria-label="Black" tabindex="0"></div>
    </div>

    <div class="divider"></div>

    <div class="shapes" aria-label="Shape selection">
      <button class="shape-btn active" data-shape="circle" aria-label="Circle" title="Circle" tabindex="0">
        <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="8"/></svg>
      </button>
      <button class="shape-btn" data-shape="square" aria-label="Square" title="Square" tabindex="0">
        <svg viewBox="0 0 20 20"><rect x="3" y="3" width="14" height="14"/></svg>
      </button>
      <button class="shape-btn" data-shape="triangle" aria-label="Triangle" title="Triangle" tabindex="0">
        <svg viewBox="0 0 20 20"><polygon points="10,2 18,18 2,18"/></svg>
      </button>
      <button class="shape-btn" data-shape="diagonal" aria-label="Line" title="Diagonal Line" tabindex="0">
        <svg viewBox="0 0 20 20"><line x1="2" y1="18" x2="18" y2="2" stroke="white" stroke-width="2.5"/></svg>
      </button>
      <button class="shape-btn" data-shape="half" aria-label="Half" title="Half Fill" tabindex="0">
        <svg viewBox="0 0 20 20"><rect x="2" y="2" width="8" height="16"/></svg>
      </button>
      <button class="shape-btn" data-shape="ring" aria-label="Ring" title="Ring" tabindex="0">
        <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="7" fill="none" stroke="white" stroke-width="2"/></svg>
      </button>
    </div>

    <div class="divider"></div>

    <button class="action-btn btn-play" id="btnPlay" aria-label="Play composition" tabindex="0">Play</button>
    <button class="action-btn btn-clear" id="btnClear" aria-label="Clear all shapes" tabindex="0">Reset</button>
    <button class="action-btn btn-mute" id="btnMute" aria-label="Toggle sound" tabindex="0" title="Toggle sound">🔊</button>
  </div>

  <div class="completion-overlay" id="completionOverlay">
    <div class="completion-card">
      <h2>Composition Complete</h2>
      <p>36 elements placed — the grid sings.</p>
      <button class="action-btn btn-play" id="btnReplay" tabindex="0">Play Again</button>
      <button class="action-btn btn-clear" id="btnNew" tabindex="0">New Canvas</button>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      var GRID_SIZE = 6;
      var TOTAL_CELLS = GRID_SIZE * GRID_SIZE;
      var grid = [];
      var selectedColor = 'red';
      var selectedShape = 'circle';
      var audioCtx = null;
      var muted = false;
      var placedCount = 0;
      var lastHoverTime = 0;

      // Color to frequency mapping (pentatonic scale for harmony)
      var NOTE_FREQS = {
        red: 261.63,    // C4
        blue: 293.66,   // D4
        yellow: 349.23, // F4
        white: 392.00,  // G4
        black: 440.00   // A4
      };

      var SHAPE_OCTAVES = {
        circle: 0,
        square: 1,
        triangle: 2,
        diagonal: -1,
        half: 1,
        ring: 0
      };

      // --- Audio Engine ---
      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      }

      function playNote(color, shape, duration) {
        if (muted || !audioCtx) return;
        var baseFreq = NOTE_FREQS[color] || 261.63;
        var octaveShift = SHAPE_OCTAVES[shape] || 0;
        var freq = baseFreq * Math.pow(2, octaveShift);
        var now = audioCtx.currentTime;
        var dur = duration || 0.3;

        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();

        osc.type = shape === 'circle' ? 'sine' : (shape === 'square' ? 'triangle' : 'square');
        osc.frequency.setValueAtTime(freq, now);

        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.12, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, now + dur);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + dur);
      }

      function playHarmony() {
        if (muted || !audioCtx) return;
        var now = audioCtx.currentTime;
        var notes = [261.63, 329.63, 392.00, 523.25];
        notes.forEach(function(freq, i) {
          var osc = audioCtx.createOscillator();
          var gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now);
          gain.gain.setValueAtTime(0, now + i * 0.12);
          gain.gain.linearRampToValueAtTime(0.08, now + i * 0.12 + 0.03);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now + i * 0.12);
          osc.stop(now + 2.5);
        });
      }

      function playResetSound() {
        if (muted || !audioCtx) return;
        var now = audioCtx.currentTime;
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(150, now + 0.3);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.3);
      }

      function playHoverSound() {
        if (muted || !audioCtx) return;
        var now = audioCtx.currentTime;
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        gain.gain.setValueAtTime(0.015, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.05);
      }

      function playRemoveSound() {
        if (muted || !audioCtx) return;
        var now = audioCtx.currentTime;
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.15);
      }

      // --- Grid ---
      var gridEl = document.getElementById('grid');
      var scoreGlow = document.getElementById('scoreGlow');
      var compFlash = document.getElementById('compFlash');
      var completionOverlay = document.getElementById('completionOverlay');

      for (var i = 0; i < TOTAL_CELLS; i++) {
        var cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.index = i;
        cell.setAttribute('role', 'gridcell');
        cell.setAttribute('tabindex', '0');
        cell.setAttribute('aria-label', 'Row ' + (Math.floor(i / GRID_SIZE) + 1) + ', Column ' + (i % GRID_SIZE + 1));
        cell.addEventListener('click', onCellClick);
        cell.addEventListener('mouseenter', onCellHover);
        cell.addEventListener('keydown', onCellKey);
        gridEl.appendChild(cell);
        grid.push({ el: cell, data: null });
      }

       function onCellHover(e) {
        var idx = parseInt(e.currentTarget.dataset.index);
        var now = Date.now();
        if (now - lastHoverTime < 80) return;
        lastHoverTime = now;
        if (!grid[idx].data) {
          playHoverSound();
         }
       }

      function onCellKey(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          onCellClick(e);
        }
      }

      function onCellClick(e) {
        initAudio();
        var idx = parseInt(e.currentTarget.dataset.index);
        var cellData = grid[idx];

        if (cellData.data) {
          removeShape(idx);
        } else {
          placeShape(idx);
        }
      }

      function placeShape(idx) {
        var cellData = grid[idx];
        var color = selectedColor;
        var shape = selectedShape;
        cellData.data = { color: color, shape: shape };

        var content = document.createElement('div');
        content.className = 'cell-content';

        var shapeEl = createShapeElement(shape, color);
        content.appendChild(shapeEl);

        var existing = cellData.el.querySelector('.cell-content');
        if (existing) existing.remove();
        cellData.el.appendChild(content);
        cellData.el.classList.add('filled');

        playNote(color, shape, 0.35);
        placedCount++;
        updateProgress();

        if (placedCount === TOTAL_CELLS) {
          setTimeout(onAllPlaced, 400);
        }
      }

      function removeShape(idx) {
        var cellData = grid[idx];
        if (!cellData.data) return;

        var existing = cellData.el.querySelector('.cell-content');
        if (existing) {
          existing.style.animation = 'removeOut 0.2s ease forwards';
          setTimeout(function() {
            if (existing.parentNode) existing.remove();
          }, 200);
        }
        cellData.el.classList.remove('filled');
        var removedColor = cellData.data.color;
        var removedShape = cellData.data.shape;
        cellData.data = null;
        placeShape_countSafe();
        playRemoveSound();
        updateProgress();

        if (completionOverlay.classList.contains('visible')) {
          completionOverlay.classList.remove('visible');
        }
      }

      function placeShape_countSafe() {
        placedCount = 0;
        for (var i = 0; i < grid.length; i++) {
          if (grid[i].data) placedCount++;
        }
      }

      function createShapeElement(shape, color) {
        var el = document.createElement('div');
        switch (shape) {
          case 'circle':
            el.className = 'shape-circle color-' + color;
            break;
          case 'square':
            el.className = 'shape-square color-' + color;
            break;
          case 'triangle':
            el.className = 'shape-triangle border-' + color;
            break;
          case 'diagonal':
            el.className = 'shape-diagonal';
            var afterHack = document.createElement('span');
            afterHack.style.cssText = 'position:absolute;width:140%;height:3px;top:50%;left:20%;transform:rotate(45deg);';
            afterHack.className = 'line-' + color;
            var colorMap = { red: '#E03C2A', blue: '#2058C8', yellow: '#F0C830', white: '#F5F0E8', black: '#8E8E8E' };
            afterHack.style.background = colorMap[color] || '#8E8E8E';
            el.appendChild(afterHack);
            break;
          case 'half':
            el.className = 'shape-half half-' + color;
            break;
          case 'ring':
            el.className = 'shape-ring ring-' + color;
            break;
        }
        return el;
      }

      function updateProgress() {
        var pct = (placedCount / TOTAL_CELLS) * 100;
        scoreGlow.style.width = pct + '%';
      }

      function onAllPlaced() {
        playHarmony();
        compFlash.classList.add('active');
        setTimeout(function() {
          compFlash.classList.remove('active');
        }, 1500);
        setTimeout(function() {
          completionOverlay.classList.add('visible');
        }, 800);
      }

      // --- Tool controls ---
      var swatches = document.querySelectorAll('.palette-swatch');
      swatches.forEach(function(sw) {
        sw.addEventListener('click', function() {
          swatches.forEach(function(s) { s.classList.remove('active'); });
          sw.classList.add('active');
          selectedColor = sw.dataset.color;
          initAudio();
          playNote(selectedColor, 'circle', 0.1);
        });
        sw.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            sw.click();
          }
        });
      });

      var shapeBtns = document.querySelectorAll('.shape-btn');
      shapeBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          shapeBtns.forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          selectedShape = btn.dataset.shape;
          initAudio();
        });
        btn.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            btn.click();
          }
        });
      });

      // --- Action buttons ---
      document.getElementById('btnClear').addEventListener('click', function() {
        initAudio();
        playResetSound();
        for (var i = 0; i < grid.length; i++) {
          var existing = grid[i].el.querySelector('.cell-content');
          if (existing) existing.remove();
          grid[i].el.classList.remove('filled');
          grid[i].data = null;
        }
        placedCount = 0;
        updateProgress();
        completionOverlay.classList.remove('visible');
      });

      document.getElementById('btnPlay').addEventListener('click', function() {
        initAudio();
        playCompositionSequence();
      });

      document.getElementById('btnMute').addEventListener('click', function() {
        muted = !muted;
        this.textContent = muted ? '\uD83D\uDD07' : '\uD83D\uDD0A';
        this.setAttribute('aria-label', muted ? 'Unmute sound' : 'Mute sound');
      });

      document.getElementById('btnReplay').addEventListener('click', function() {
        completionOverlay.classList.remove('visible');
      });

      document.getElementById('btnNew').addEventListener('click', function() {
        completionOverlay.classList.remove('visible');
        document.getElementById('btnClear').click();
      });

      function playCompositionSequence() {
        var filledCells = [];
        for (var i = 0; i < grid.length; i++) {
          if (grid[i].data) filledCells.push(i);
        }
        if (filledCells.length === 0) return;

        var delay = Math.max(60, 500 / filledCells.length);
        filledCells.forEach(function(idx, order) {
          setTimeout(function() {
            var d = grid[idx].data;
            playNote(d.color, d.shape, 0.25);
            grid[idx].el.style.transform = 'scale(1.08)';
            setTimeout(function() {
              grid[idx].el.style.transform = '';
            }, 150);
          }, order * delay);
        });
      }

      // Keyboard navigation across the toolbar
      document.querySelector('.controls').addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
          var focusable = Array.from(document.querySelectorAll('.controls [tabindex="0"]'));
          var currentIdx = focusable.indexOf(document.activeElement);
          if (currentIdx === -1) return;
          var nextIdx = e.key === 'ArrowRight'
            ? Math.min(currentIdx + 1, focusable.length - 1)
            : Math.max(currentIdx - 1, 0);
          focusable[nextIdx].focus();
          e.preventDefault();
        }
      });

      // Keyboard navigation across the grid
      gridEl.addEventListener('keydown', function(e) {
        var currentEl = document.activeElement;
        if (!currentEl.classList.contains('cell')) return;
        var idx = parseInt(currentEl.dataset.index);
        var nextIdx = -1;

        if (e.key === 'ArrowRight') nextIdx = idx + 1;
        else if (e.key === 'ArrowLeft') nextIdx = idx - 1;
        else if (e.key === 'ArrowDown') nextIdx = idx + GRID_SIZE;
        else if (e.key === 'ArrowUp') nextIdx = idx - GRID_SIZE;

        if (nextIdx >= 0 && nextIdx < TOTAL_CELLS) {
          grid[nextIdx].el.focus();
          e.preventDefault();
        }
      });

      // Touch support: prevent double-tap zoom on grid cells
      var lastTouch = 0;
      gridEl.addEventListener('touchend', function(e) {
        var now = Date.now();
        if (now - lastTouch < 300) {
          e.preventDefault();
        }
        lastTouch = now;
      }, false);
    })();
  </script>
</body>
</html>
