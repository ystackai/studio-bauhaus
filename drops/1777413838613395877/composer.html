<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bauhaus Composer — Art and Technology Are One</title>
    <style>
      :root {
        --red: #E03C2A;
        --blue: #2058C8;
        --yellow: #F0C830;
        --black: #1A1A1A;
        --white: #F5F0E8;
        --gray: #8E8E8E;
        --dark-gray: #3A3A3A;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
     body {
       font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
       background: var(--black);
       color: var(--white);
       overflow-x: hidden;
       min-height: 100vh;
       display: flex;
       flex-direction: column;
      }
      .bg-geometry {
       position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.03;
      }
      .bg-shape { position: absolute; }
      .bg-circle {
       width: 300px; height: 300px; border-radius: 50%;
       border: 2px solid var(--white); top: -80px; right: -60px;
      }
      .bg-triangle {
       width: 0; height: 0;
       border-left: 150px solid transparent; border-right: 150px solid transparent;
       border-bottom: 260px solid var(--white); bottom: -100px; left: -50px;
      }
      .bg-line {
       width: 120%; height: 1px; background: var(--white);
       top: 30%; left: -10%; transform: rotate(-25deg);
      }
      .bg-square {
       width: 200px; height: 200px; border: 2px solid var(--white);
       top: 50%; right: -80px; transform: rotate(15deg);
      }
      .header {
       text-align: center; padding: 2rem 1rem 0.5rem; position: relative; z-index: 1;
      }
      .header-bar {
       display: flex; justify-content: center; gap: 4px; margin-top: 0.6rem;
      }
      .header-bar span { display: block; height: 3px; }
      .header-bar .bar-red { background: var(--red); width: 50px; }
      .header-bar .bar-blue { background: var(--blue); width: 40px; }
      .header-bar .bar-yellow { background: var(--yellow); width: 30px; }
      .header-bar .bar-thin { background: var(--gray); width: 15px; height: 2px; }
      .header h1 {
       font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 900;
       letter-spacing: -1px; text-transform: uppercase; line-height: 1;
      }
      .header h1 .red { color: var(--red); }
      .header h1 .blue { color: var(--blue); }
      .header h1 .yellow { color: var(--yellow); }
      .subtitle {
       font-size: 0.85rem; color: var(--gray); letter-spacing: 3px;
       text-transform: uppercase; margin-top: 0.3rem;
      }
      .composition-area {
       flex: 1; display: flex; justify-content: center; align-items: center;
       padding: 1rem; position: relative; z-index: 1;
      }
      .grid-container {
       display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(6, 1fr);
       gap: 3px; width: min(85vw, 540px); height: min(85vw, 540px);
       max-width: 540px; max-height: 540px; aspect-ratio: 1; position: relative;
      }
      .cell {
       background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
       border-radius: 2px; cursor: pointer; transition: all 0.15s ease;
       position: relative; overflow: hidden;
      }
      .cell:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
      .cell.filled { cursor: pointer; }
      .cell.filled:hover { transform: scale(1.05); z-index: 2; }
      .cell.wave-active {
       box-shadow: 0 0 12px rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.3);
      }
      .cell-content {
       position: absolute; inset: 0; display: flex; align-items: center;
       justify-content: center; animation: placeIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      }
      @keyframes placeIn {
        0% { transform: scale(0) rotate(-30deg); opacity: 0; }
        100% { transform: scale(1) rotate(0deg); opacity: 1; }
      }
      @keyframes removeOut {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(0) rotate(20deg); opacity: 0; }
      }
      .shape-circle { width: 60%; height: 60%; border-radius: 50%; }
      .shape-square { width: 55%; height: 55%; }
      .shape-triangle {
       width: 0; height: 0;
       border-left: 22px solid transparent; border-right: 22px solid transparent;
       border-bottom: 38px solid; background: none !important;
      }
      .shape-diagonal { width: 100%; height: 100%; }
      .shape-diagonal::after {
       content: ''; position: absolute; width: 140%; height: 3px; transform: rotate(45deg);
      }
      .shape-half { width: 100%; height: 100%; }
      .shape-ring {
       width: 55%; height: 55%; border-radius: 50%;
       border: 3px solid; background: transparent !important;
      }
      .color-red { background-color: var(--red); }
      .color-blue { background-color: var(--blue); }
      .color-yellow { background-color: var(--yellow); }
      .color-black { background-color: var(--black); border: 1px solid var(--gray); }
      .color-white { background-color: var(--white); }
      .shape-triangle.border-red { border-bottom-color: var(--red); }
      .shape-triangle.border-blue { border-bottom-color: var(--blue); }
      .shape-triangle.border-yellow { border-bottom-color: var(--yellow); }
      .shape-triangle.border-white { border-bottom-color: var(--white); }
      .shape-diagonal::after.line-red { background: var(--red); }
      .shape-diagonal::after.line-blue { background: var(--blue); }
      .shape-diagonal::after.line-yellow { background: var(--yellow); }
      .shape-diagonal::after.line-white { background: var(--white); }
      .shape-half.half-red { background: linear-gradient(90deg, var(--red) 50%, transparent 50%); }
      .shape-half.half-blue { background: linear-gradient(90deg, var(--blue) 50%, transparent 50%); }
      .shape-half.half-yellow { background: linear-gradient(90deg, var(--yellow) 50%, transparent 50%); }
      .shape-ring.ring-red { border-color: var(--red); }
      .shape-ring.ring-blue { border-color: var(--blue); }
      .shape-ring.ring-yellow { border-color: var(--yellow); }
      .controls {
       display: flex; justify-content: center; align-items: center;
       gap: 0.75rem; padding: 1rem; flex-wrap: wrap; position: relative; z-index: 1;
      }
      .palette { display: flex; gap: 0.4rem; align-items: center; }
      .palette-swatch {
       width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
       border: 2px solid transparent; transition: all 0.15s ease; position: relative;
      }
      .palette-swatch:hover { transform: scale(1.15); }
      .palette-swatch.active {
       border-color: var(--white); transform: scale(1.15);
       box-shadow: 0 0 0 2px var(--black), 0 0 0 4px var(--white);
      }
      .swatch-red { background: var(--red); }
      .swatch-blue { background: var(--blue); }
      .swatch-yellow { background: var(--yellow); }
      .swatch-black { background: var(--black); border: 1px solid var(--gray); }
      .swatch-white { background: var(--white); }
      .shapes { display: flex; gap: 0.4rem; align-items: center; }
      .shape-btn {
       width: 36px; height: 36px; background: rgba(255,255,255,0.06);
       border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; cursor: pointer;
       display: flex; align-items: center; justify-content: center; transition: all 0.15s ease;
      }
      .shape-btn:hover { background: rgba(255,255,255,0.12); }
      .shape-btn.active { border-color: var(--white); background: rgba(255,255,255,0.15); }
      .shape-btn svg { width: 18px; height: 18px; fill: var(--white); }
      .action-btn {
       padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.8rem; font-weight: 700;
       font-family: inherit; letter-spacing: 0.5px; text-transform: uppercase;
       cursor: pointer; border: none; transition: all 0.15s ease;
      }
      .btn-clear { background: var(--red); color: var(--white); }
      .btn-clear:hover { background: #c43524; }
      .btn-play { background: var(--blue); color: var(--white); }
      .btn-play:hover { background: #1a49a8; }
      .btn-random { background: var(--yellow); color: var(--black); }
      .btn-random:hover { background: #d4b028; }
      .btn-mute {
       background: rgba(255,255,255,0.08); color: var(--white);
       border: 1px solid rgba(255,255,255,0.15); font-size: 1rem; padding: 0.4rem 0.6rem;
      }
      .btn-mute:hover { background: rgba(255,255,255,0.14); }
      .score {
       position: fixed; top: 0; left: 0; right: 0; height: 3px;
       background: transparent; z-index: 50;
      }
      .score-glow {
       height: 100%; width: 0%;
       background: linear-gradient(90deg, var(--red), var(--yellow), var(--blue));
       transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .composition-flash {
       position: fixed; inset: 0; pointer-events: none; opacity: 0;
       transition: opacity 0.4s ease; z-index: 100;
      }
      .composition-flash.active { animation: flashPulse 1.5s ease forwards; }
      @keyframes flashPulse {
        0% { opacity: 0; background: rgba(255,255,255,0); }
        15% { opacity: 1; background: rgba(255,255,255,0.15); }
        100% { opacity: 0; background: rgba(255,255,255,0); }
      }
      .celebration-container { position: fixed; inset: 0; pointer-events: none; z-index: 99; }
      .celebration-particle {
       position: absolute; opacity: 0; animation: particleBurst 1.2s ease-out forwards;
      }
      @keyframes particleBurst {
        0% { opacity: 1; transform: scale(0) rotate(0deg); }
        40% { opacity: 1; }
        100% { opacity: 0; transform: scale(1) rotate(180deg); }
      }
      .completion-overlay {
       position: fixed; inset: 0; background: rgba(0,0,0,0.85);
       display: flex; align-items: center; justify-content: center;
       z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
      }
      .completion-overlay.visible { opacity: 1; pointer-events: auto; }
      .completion-card {
       position: relative; text-align: center; padding: 2.5rem;
       background: var(--black); border: 1px solid rgba(255,255,255,0.1);
       border-radius: 12px; transform: scale(0.9);
       transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .completion-overlay.visible .completion-card { transform: scale(1); }
      .completion-card h2 {
       font-size: 1.5rem; font-weight: 900; text-transform: uppercase;
       letter-spacing: 2px; margin-bottom: 0.5rem;
      }
      .completion-card p { color: var(--gray); font-size: 0.9rem; margin-bottom: 1.5rem; }
      .completion-card .action-btn { margin: 0 0.25rem; }
      .completion-card::before {
       content: ''; position: absolute; top: 8px; left: 8px; right: 8px; height: 3px;
       background: linear-gradient(90deg, var(--red) 33%, var(--yellow) 33% 66%, var(--blue) 66%);
       border-radius: 2px;
      }
      .divider { width: 3px; height: 24px; background: rgba(255,255,255,0.15); }
      .is-playing .cell-content { animation: none; }
      .is-playing .cell.wave-active .cell-content > div { animation: wavePulse 0.2s ease; }
      @keyframes wavePulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
      .hint {
       text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.25);
       letter-spacing: 1px; text-transform: uppercase; padding-bottom: 0.5rem;
      }
      @media (max-width: 600px) {
        .controls { gap: 0.5rem; padding: 0.75rem 0.5rem; }
        .palette-swatch, .shape-btn { width: 30px; height: 30px; }
        .shape-btn svg { width: 14px; height: 14px; }
        .action-btn { padding: 0.4rem 0.7rem; font-size: 0.7rem; }
        .divider { height: 20px; }
        .shape-triangle { border-left-width: 16px; border-right-width: 16px; border-bottom-width: 28px; }
      }
      @media (max-width: 400px) {
        .grid-container { gap: 2px; }
        .header h1 { font-size: 1.5rem; }
      }
    </style>
</head>
<body>
    <div class="bg-geometry">
      <div class="bg-shape bg-circle"></div>
      <div class="bg-shape bg-triangle"></div>
      <div class="bg-shape bg-line"></div>
      <div class="bg-shape bg-square"></div>
    </div>
    <div class="score"><div class="score-glow" id="scoreGlow"></div></div>
    <div class="composition-flash" id="compFlash"></div>
    <div class="celebration-container" id="celebrationContainer"></div>

    <div class="header">
      <h1>
        <span class="red">B</span><span class="blue">a</span><span class="yellow">u</span>hau<span class="red">s</span>
      </h1>
      <div class="subtitle">Geometric Composer</div>
      <div class="header-bar">
        <span class="bar-red"></span>
        <span class="bar-blue"></span>
        <span class="bar-yellow"></span>
        <span class="bar-thin"></span>
        <span class="bar-blue"></span>
        <span class="bar-red"></span>
      </div>
    </div>

    <div class="composition-area">
      <div class="grid-container" id="grid" role="grid" aria-label="Bauhaus composition grid"></div>
    </div>

    <div class="hint">click to place · click filled to remove</div>

    <div class="controls" role="toolbar" aria-label="Composition tools">
      <div class="palette" aria-label="Color palette">
        <div class="palette-swatch swatch-red active" data-color="red" role="button" aria-label="Red" tabindex="0"></div>
        <div class="palette-swatch swatch-blue" data-color="blue" role="button" aria-label="Blue" tabindex="0"></div>
        <div class="palette-swatch swatch-yellow" data-color="yellow" role="button" aria-label="Yellow" tabindex="0"></div>
        <div class="palette-swatch swatch-white" data-color="white" role="button" aria-label="White" tabindex="0"></div>
        <div class="palette-swatch swatch-black" data-color="black" role="button" aria-label="Black" tabindex="0"></div>
      </div>
      <div class="divider"></div>
      <div class="shapes" aria-label="Shape selection">
        <button class="shape-btn active" data-shape="circle" aria-label="Circle" title="Circle" tabindex="0"><svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="8"/></svg></button>
        <button class="shape-btn" data-shape="square" aria-label="Square" title="Square" tabindex="0"><svg viewBox="0 0 20 20"><rect x="3" y="3" width="14" height="14"/></svg></button>
        <button class="shape-btn" data-shape="triangle" aria-label="Triangle" title="Triangle" tabindex="0"><svg viewBox="0 0 20 20"><polygon points="10,2 18,18 2,18"/></svg></button>
        <button class="shape-btn" data-shape="diagonal" aria-label="Line" title="Diagonal Line" tabindex="0"><svg viewBox="0 0 20 20"><line x1="2" y1="18" x2="18" y2="2" stroke="white" stroke-width="2.5"/></svg></button>
        <button class="shape-btn" data-shape="half" aria-label="Half" title="Half Fill" tabindex="0"><svg viewBox="0 0 20 20"><rect x="2" y="2" width="8" height="16"/></svg></button>
        <button class="shape-btn" data-shape="ring" aria-label="Ring" title="Ring" tabindex="0"><svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="7" fill="none" stroke="white" stroke-width="2"/></svg></button>
      </div>
      <div class="divider"></div>
      <button class="action-btn btn-play" id="btnPlay" aria-label="Play composition" tabindex="0">Play</button>
      <button class="action-btn btn-random" id="btnRandom" aria-label="Random composition" tabindex="0">Random</button>
      <button class="action-btn btn-clear" id="btnClear" aria-label="Clear all shapes" tabindex="0">Reset</button>
      <button class="action-btn btn-mute" id="btnMute" aria-label="Toggle sound" tabindex="0" title="Toggle sound">&#128266;</button>
    </div>

    <div class="completion-overlay" id="completionOverlay">
      <div class="completion-card">
        <h2>Composition Complete</h2>
        <p>36 elements placed — the grid sings.</p>
        <button class="action-btn btn-play" id="btnReplay" tabindex="0">Play Again</button>
        <button class="action-btn btn-clear" id="btnNew" tabindex="0">New Canvas</button>
      </div>
    </div>

    <script>
(function() {
  'use strict';

    var GRID_SIZE = 6;
    var TOTAL_CELLS = GRID_SIZE * GRID_SIZE;
    var grid = [];
    var selectedColor = 'red';
    var selectedShape = 'circle';
    var audioCtx = null;
    var muted = false;
    var placedCount = 0;
    var lastHoverTime = 0;
    var isRandomizing = false;
    var isPlaying = false;

    var NOTE_FREQS = {
      red: 261.63,
      blue: 293.66,
      yellow: 349.23,
      white: 392.00,
      black: 440.00
    };

    var SHAPE_OCTAVES = {
      circle: 0, square: 1, triangle: 2,
      diagonal: -1, half: 1, ring: 0
    };

    var COLORS = ['red', 'blue', 'yellow', 'white', 'black'];
    var SHAPES = ['circle', 'square', 'triangle', 'diagonal', 'half', 'ring'];

    // --- Audio Engine ---
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') { audioCtx.resume(); }
    }

    function playNote(color, shape, duration) {
      if (muted || !audioCtx) return;
      var baseFreq = NOTE_FREQS[color] || 261.63;
      var octaveShift = SHAPE_OCTAVES[shape] || 0;
      var freq = baseFreq * Math.pow(2, octaveShift);
      var now = audioCtx.currentTime;
      var dur = duration || 0.3;

      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = shape === 'circle' ? 'sine' : (shape === 'square' ? 'triangle' : 'square');
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.12, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + dur);
    }

    function playHarmony() {
      if (muted || !audioCtx) return;
      var now = audioCtx.currentTime;
      var chords = [261.63, 329.63, 392.00, 523.25];
      chords.forEach(function(freq, i) {
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(0, now + i * 0.12);
        gain.gain.linearRampToValueAtTime(0.08, now + i * 0.12 + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(now + i * 0.12); osc.stop(now + 3);
      });
      var upper = [523.25, 659.25, 783.99];
      upper.forEach(function(freq, i) {
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, now + 0.5);
        gain.gain.setValueAtTime(0, now + 0.5 + i * 0.1);
        gain.gain.linearRampToValueAtTime(0.04, now + 0.5 + i * 0.1 + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(now + 0.5 + i * 0.1); osc.stop(now + 3);
      });
      var sub = audioCtx.createOscillator();
      var subGain = audioCtx.createGain();
      sub.type = 'sine';
      sub.frequency.setValueAtTime(65.41, now);
      subGain.gain.setValueAtTime(0, now);
      subGain.gain.linearRampToValueAtTime(0.06, now + 0.2);
      subGain.gain.exponentialRampToValueAtTime(0.001, now + 3);
      sub.connect(subGain); subGain.connect(audioCtx.destination);
      sub.start(now); sub.stop(now + 3);
    }

    function playResetSound() {
      if (muted || !audioCtx) return;
      var now = audioCtx.currentTime;
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(150, now + 0.3);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.3);
    }

    function playHoverSound() {
      if (muted || !audioCtx) return;
      var now = audioCtx.currentTime;
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, now);
      gain.gain.setValueAtTime(0.015, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.05);
    }

    function playRemoveSound() {
      if (muted || !audioCtx) return;
      var now = audioCtx.currentTime;
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
      gain.gain.setValueAtTime(0.06, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.15);
    }

    function playPlaceBlip() {
      if (muted || !audioCtx) return;
      var now = audioCtx.currentTime;
      var osc = audioCtx.createOscillator();
      var osc2 = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1200, now);
      osc.frequency.exponentialRampToValueAtTime(600, now + 0.08);
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(800, now);
      gain.gain.setValueAtTime(0.06, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc2.start(now); osc.stop(now + 0.1); osc2.stop(now + 0.1);
    }

    // --- Build Grid ---
    var gridEl = document.getElementById('grid');
    var scoreGlow = document.getElementById('scoreGlow');
    var compFlash = document.getElementById('compFlash');
    var completionOverlay = document.getElementById('completionOverlay');
    var celebContainer = document.getElementById('celebrationContainer');

    for (var i = 0; i < TOTAL_CELLS; i++) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.index = i;
      cell.setAttribute('role', 'gridcell');
      cell.setAttribute('tabindex', '0');
      cell.setAttribute('aria-label', 'Row ' + (Math.floor(i / GRID_SIZE) + 1) + ', Column ' + (i % GRID_SIZE + 1));
      cell.addEventListener('click', onCellClick);
      cell.addEventListener('mouseenter', onCellHover);
      cell.addEventListener('keydown', onCellKey);
      gridEl.appendChild(cell);
      grid.push({ el: cell, data: null });
    }

    function onCellHover(e) {
      var idx = parseInt(e.currentTarget.dataset.index);
      var now = Date.now();
      if (now - lastHoverTime < 80) return;
      lastHoverTime = now;
      if (!grid[idx].data) { playHoverSound(); }
    }

    function onCellKey(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        onCellClick(e);
      }
    }

    function onCellClick(e) {
      initAudio();
      var idx = parseInt(e.currentTarget.dataset.index);
      var cellData = grid[idx];
      if (cellData.data) {
        removeShape(idx);
      } else {
        placeShape(idx, selectedColor, selectedShape);
      }
    }

    function placeShape(idx, color, shape) {
      var cellData = grid[idx];
      cellData.data = { color: color, shape: shape };
      var content = document.createElement('div');
      content.className = 'cell-content';
      var shapeEl = createShapeElement(shape, color);
      content.appendChild(shapeEl);
      var existing = cellData.el.querySelector('.cell-content');
      if (existing) existing.remove();
      cellData.el.appendChild(content);
      cellData.el.classList.add('filled');
      playNote(color, shape, 0.35);
      recalcCount();
      updateProgress();
      if (placedCount === TOTAL_CELLS) {
        setTimeout(onAllPlaced, 400);
      }
    }

    function removeShape(idx) {
      var cellData = grid[idx];
      if (!cellData.data) return;
      var existing = cellData.el.querySelector('.cell-content');
      if (existing) {
        existing.style.animation = 'removeOut 0.2s ease forwards';
        setTimeout(function() { if (existing.parentNode) existing.remove(); }, 200);
      }
      cellData.el.classList.remove('filled');
      cellData.data = null;
      recalcCount();
      playRemoveSound();
      updateProgress();
      if (completionOverlay.classList.contains('visible')) {
        completionOverlay.classList.remove('visible');
      }
    }

    function recalcCount() {
      placedCount = 0;
      for (var i = 0; i < grid.length; i++) {
        if (grid[i].data) placedCount++;
      }
    }

    function createShapeElement(shape, color) {
      var el = document.createElement('div');
      switch (shape) {
        case 'circle': el.className = 'shape-circle color-' + color; break;
        case 'square': el.className = 'shape-square color-' + color; break;
        case 'triangle': el.className = 'shape-triangle border-' + color; break;
        case 'diagonal':
          el.className = 'shape-diagonal';
          var line = document.createElement('span');
          line.style.cssText = 'position:absolute;width:140%;height:3px;top:50%;left:20%;transform:rotate(45deg);';
          var colorMap = { red: '#E03C2A', blue: '#2058C8', yellow: '#F0C830', white: '#F5F0E8', black: '#8E8E8E' };
          line.style.background = colorMap[color] || '#8E8E8E';
          el.appendChild(line);
          break;
        case 'half': el.className = 'shape-half half-' + color; break;
        case 'ring': el.className = 'shape-ring ring-' + color; break;
      }
      return el;
    }

    function updateProgress() {
      var pct = (placedCount / TOTAL_CELLS) * 100;
      scoreGlow.style.width = pct + '%';
    }

    function onAllPlaced() {
      playHarmony();
      compFlash.classList.add('active');
      spawnCelebration();
      setTimeout(function() { compFlash.classList.remove('active'); }, 1500);
      setTimeout(function() { completionOverlay.classList.add('visible'); }, 800);
    }

    // --- Celebration particles ---
    function spawnCelebration() {
      celebContainer.innerHTML = '';
      var particleColors = ['#E03C2A', '#2058C8', '#F0C830', '#F5F0E8'];
      for (var i = 0; i < 30; i++) {
        var p = document.createElement('div');
        p.className = 'celebration-particle';
        var size = 6 + Math.random() * 14;
        var x = Math.random() * 100;
        var y = Math.random() * 100;
        var delay = Math.random() * 0.4;
        var isCircle = Math.random() > 0.5;
        p.style.cssText = 'left:' + x + '%;top:' + y + '%;width:' + size + 'px;height:' + size + 'px;background:' + particleColors[Math.floor(Math.random() * 4)] + ';border-radius:' + (isCircle ? '50%' : '2px') + ';animation-delay:' + delay + 's;';
        celebContainer.appendChild(p);
      }
      setTimeout(function() { celebContainer.innerHTML = ''; }, 2000);
    }

    // --- Random Composition ---
    function randomComposition() {
      if (isRandomizing) return;
      isRandomizing = true;
      initAudio();
      // Clear first
      for (var i = 0; i < grid.length; i++) {
        var existing = grid[i].el.querySelector('.cell-content');
        if (existing) existing.remove();
        grid[i].el.classList.remove('filled');
        grid[i].data = null;
      }
      placedCount = 0;
      updateProgress();
      completionOverlay.classList.remove('visible');

      // Fill cells with random shapes/colors in random order
      var indices = [];
      for (var i = 0; i < TOTAL_CELLS; i++) indices.push(i);
      for (var j = indices.length - 1; j > 0; j--) {
        var k = Math.floor(Math.random() * (j + 1));
        var tmp = indices[j]; indices[j] = indices[k]; indices[k] = tmp;
      }

      var delay = 60;
      indices.forEach(function(idx, order) {
        setTimeout(function() {
          var c = COLORS[Math.floor(Math.random() * COLORS.length)];
          var s = SHAPES[Math.floor(Math.random() * SHAPES.length)];
          placeShape(idx, c, s);
          if (order === indices.length - 1) {
            isRandomizing = false;
          }
        }, order * delay);
      });
    }

    // --- Wave Play Sequence ---
    function playCompositionSequence() {
      if (isPlaying) return;
      var filledCells = [];
      for (var i = 0; i < grid.length; i++) {
        if (grid[i].data) filledCells.push(i);
      }
      if (filledCells.length === 0) return;
      initAudio();
      isPlaying = true;
      gridEl.classList.add('is-playing');

      // Create wave light bar
      var waveEl = document.createElement('div');
      waveEl.className = 'wave-row';
      waveEl.style.opacity = '0';
      gridEl.parentNode.appendChild(waveEl);

      var delay = Math.max(50, 400 / filledCells.length);
      var totalDur = filledCells.length * delay + 200;

      filledCells.forEach(function(idx, order) {
        setTimeout(function() {
          var d = grid[idx].data;
          playNote(d.color, d.shape, 0.3);
          grid[idx].el.classList.add('wave-active');
          grid[idx].el.style.transform = 'scale(1.08)';

          // Move wave light highlight
          var row = Math.floor(idx / GRID_SIZE);
          var col = idx % GRID_SIZE;
          var cellRect = grid[idx].el.getBoundingClientRect();
          var gridRect = gridEl.getBoundingClientRect();
          waveEl.style.top = (cellRect.top - gridRect.top) + 'px';
          waveEl.style.left = (cellRect.left - gridRect.left) + 'px';
          waveEl.style.width = cellRect.width + 'px';
          waveEl.style.height = cellRect.height + 'px';
          waveEl.style.opacity = '1';

          setTimeout(function() {
            grid[idx].el.classList.remove('wave-active');
            grid[idx].el.style.transform = '';
          }, 200);

          if (order === filledCells.length - 1) {
            setTimeout(function() {
              waveEl.style.opacity = '0';
              if (waveEl.parentNode) waveEl.parentNode.removeChild(waveEl);
              gridEl.classList.remove('is-playing');
              isPlaying = false;
            }, 300);
          }
        }, order * delay);
      });
    }

    // --- Tool controls ---
    var swatches = document.querySelectorAll('.palette-swatch');
    swatches.forEach(function(sw) {
      sw.addEventListener('click', function() {
        swatches.forEach(function(s) { s.classList.remove('active'); });
        sw.classList.add('active');
        selectedColor = sw.dataset.color;
        initAudio();
        playNote(selectedColor, 'circle', 0.1);
      });
      sw.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); sw.click(); }
      });
    });

    var shapeBtns = document.querySelectorAll('.shape-btn');
    shapeBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        shapeBtns.forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        selectedShape = btn.dataset.shape;
        initAudio();
      });
      btn.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btn.click(); }
      });
    });

    // --- Action buttons ---
    document.getElementById('btnClear').addEventListener('click', function() {
      if (isPlaying) return;
      initAudio(); playResetSound();
      for (var i = 0; i < grid.length; i++) {
        var existing = grid[i].el.querySelector('.cell-content');
        if (existing) existing.remove();
        grid[i].el.classList.remove('filled');
        grid[i].data = null;
      }
      placedCount = 0; updateProgress();
      completionOverlay.classList.remove('visible');
      celebContainer.innerHTML = '';
    });

    document.getElementById('btnPlay').addEventListener('click', function() {
      playCompositionSequence();
    });

    document.getElementById('btnRandom').addEventListener('click', function() {
      randomComposition();
    });

    document.getElementById('btnMute').addEventListener('click', function() {
      muted = !muted;
      this.textContent = muted ? '\uD83D\uDD07' : '\uD83D\uDD0A';
      this.setAttribute('aria-label', muted ? 'Unmute sound' : 'Mute sound');
    });

    document.getElementById('btnReplay').addEventListener('click', function() {
      completionOverlay.classList.remove('visible');
    });

    document.getElementById('btnNew').addEventListener('click', function() {
      completionOverlay.classList.remove('visible');
      document.getElementById('btnClear').click();
    });

    // Keyboard navigation across toolbar
    document.querySelector('.controls').addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
        var focusable = Array.from(document.querySelectorAll('.controls [tabindex="0"]'));
        var currentIdx = focusable.indexOf(document.activeElement);
        if (currentIdx === -1) return;
        var nextIdx = e.key === 'ArrowRight'
          ? Math.min(currentIdx + 1, focusable.length - 1)
          : Math.max(currentIdx - 1, 0);
        focusable[nextIdx].focus();
        e.preventDefault();
      }
    });

    // Keyboard navigation across grid
    gridEl.addEventListener('keydown', function(e) {
      var currentEl = document.activeElement;
      if (!currentEl.classList.contains('cell')) return;
      var idx = parseInt(currentEl.dataset.index);
      var nextIdx = -1;
      if (e.key === 'ArrowRight') nextIdx = idx + 1;
      else if (e.key === 'ArrowLeft') nextIdx = idx - 1;
      else if (e.key === 'ArrowDown') nextIdx = idx + GRID_SIZE;
      else if (e.key === 'ArrowUp') nextIdx = idx - GRID_SIZE;
      if (nextIdx >= 0 && nextIdx < TOTAL_CELLS) {
        grid[nextIdx].el.focus();
        e.preventDefault();
      }
    });

    // Touch support: prevent double-tap zoom
    var lastTouch = 0;
    gridEl.addEventListener('touchend', function(e) {
      var now = Date.now();
      if (now - lastTouch < 300) { e.preventDefault(); }
      lastTouch = now;
    }, false);

  })();
    </script>
</body>
</html>
