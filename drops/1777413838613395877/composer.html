<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Bauhaus Composer — Art and Technology Are One</title>
   <style>
     :root {
       --red: #D93838;
       --blue: #2962AD;
        --yellow: #E8B828;
       --black: #111;
       --cream: #F2EDE4;
       --off-white: #E5DFD3;
       --dark: #1D1D1F;
       --mid-gray: #6B6B6B;
       --light-gray: #B0B0B0;
     }

     * { margin: 0; padding: 0; box-sizing: border-box; }

     html, body {
       width: 100%;
       height: 100%;
     }

     body {
       font-family: 'Helvetica Neue', Helvetica, 'Arial Narrow', Arial, sans-serif;
       background: var(--black);
       color: var(--cream);
       overflow-x: hidden;
       overflow-y: auto;
       min-height: 100vh;
       display: flex;
       flex-direction: column;
     }

     /* Geometric background */
     body::before {
       content: '';
       position: fixed;
       top: -50%;
       right: -30%;
       width: 80vw;
       height: 80vw;
       border-radius: 50%;
       background: radial-gradient(circle, rgba(217,56,56,0.04) 0%, transparent 70%);
       pointer-events: none;
       z-index: 0;
     }

     body::after {
       content: '';
       position: fixed;
       bottom: -40%;
       left: -20%;
       width: 70vw;
       height: 70vw;
       border-radius: 50%;
       background: radial-gradient(circle, rgba(41,98,173,0.04) 0%, transparent 70%);
       pointer-events: none;
       z-index: 0;
     }

     .header {
       text-align: center;
       padding: 1.8rem 1rem 0.4rem;
       position: relative;
       z-index: 1;
     }

     .header h1 {
       font-size: clamp(1.6rem, 3.5vw, 2.6rem);
       font-weight: 900;
       letter-spacing: 2px;
       text-transform: uppercase;
       line-height: 1;
     }

     .header h1 .red { color: var(--red); }
     .header h1 .blue { color: var(--blue); }
     .header h1 .yellow { color: var(--yellow); }

     .tagline {
       font-size: 0.7rem;
       color: var(--mid-gray);
       letter-spacing: 4px;
       text-transform: uppercase;
       margin-top: 0.25rem;
       font-weight: 600;
     }

     .composition-area {
       flex: 1;
       display: flex;
       justify-content: center;
       align-items: center;
       padding: 0.5rem 1rem 1rem;
       position: relative;
       z-index: 1;
       min-height: 0;
     }

     .grid-wrapper {
       position: relative;
       padding: 8px;
       background: rgba(255,255,255,0.02);
       border: 1px solid rgba(255,255,255,0.05);
       border-radius: 4px;
     }

     /* Decorative corner marks */
     .grid-wrapper::before,
     .grid-wrapper::after {
       content: '';
       position: absolute;
       background: var(--red);
     }
     .grid-wrapper::before {
       top: -1px;
       left: -1px;
       width: 16px;
       height: 2px;
     }
     .grid-wrapper::after {
       bottom: -1px;
       right: -1px;
       width: 2px;
       height: 16px;
       background: var(--blue);
     }

     .grid-container {
       display: grid;
       grid-template-columns: repeat(6, 1fr);
       gap: 2px;
       width: min(80vw, 500px);
       height: min(80vw, 500px);
       max-width: 500px;
       max-height: 500px;
     }

     .cell {
       background: rgba(255,255,255,0.02);
       border: 1px solid rgba(255,255,255,0.04);
       cursor: pointer;
       transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
       position: relative;
       overflow: hidden;
     }

     .cell:hover:not(.filled) {
       background: rgba(255,255,255,0.06);
       border-color: rgba(255,255,255,0.12);
     }

     .cell.filled {
       border-color: transparent;
     }

     .cell.filled:hover {
       transform: scale(1.06);
       z-index: 2;
       filter: brightness(1.15);
     }

     .cell.playing {
       animation: cellPulse 0.3s ease;
     }

     @keyframes cellPulse {
       0% { transform: scale(1); filter: brightness(1); }
       50% { transform: scale(1.08); filter: brightness(1.3); }
       100% { transform: scale(1); filter: brightness(1); }
     }

     .cell-content {
       position: absolute;
       inset: 0;
       display: flex;
       align-items: center;
       justify-content: center;
       animation: placeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
     }

     @keyframes placeIn {
       0% { transform: scale(0) rotate(-15deg); opacity: 0; }
       100% { transform: scale(1) rotate(0deg); opacity: 1; }
     }

     @keyframes removeOut {
       0% { transform: scale(1); opacity: 1; }
       100% { transform: scale(0.3) rotate(15deg); opacity: 0; }
     }

     /* Shape types */
     .shape-circle {
       width: 62%;
       height: 62%;
       border-radius: 50%;
     }

     .shape-square {
       width: 58%;
       height: 58%;
     }

     .shape-triangle {
       width: 0;
       height: 0;
       border-left: 20px solid transparent;
       border-right: 20px solid transparent;
       border-bottom: 34px solid;
       background: none !important;
     }

     .shape-diagonal {
       width: 100%;
       height: 100%;
       position: relative;
     }

     .shape-diagonal .line {
       position: absolute;
       width: 150%;
       height: 3px;
       top: 50%;
       left: -25%;
       transform: rotate(45deg);
     }

     .shape-half {
       width: 100%;
       height: 100%;
     }

     .shape-ring {
       width: 58%;
       height: 58%;
       border-radius: 50%;
     }

     .shape-arc {
       width: 64%;
       height: 64%;
       border-radius: 50%;
       border: 3px solid;
       background: transparent !important;
       border-bottom-color: transparent;
       border-left-color: transparent;
       transform: rotate(-45deg);
     }

     /* Color classes */
     .color-red { background-color: var(--red); }
     .color-blue { background-color: var(--blue); }
     .color-yellow { background-color: var(--yellow); }
     .color-cream { background-color: var(--cream); }
     .color-black-shape { background-color: var(--dark); outline: 1px solid var(--mid-gray); }

     .shape-triangle.border-red { border-bottom-color: var(--red); }
     .shape-triangle.border-blue { border-bottom-color: var(--blue); }
     .shape-triangle.border-yellow { border-bottom-color: var(--yellow); }
     .shape-triangle.border-cream { border-bottom-color: var(--cream); }

     .half-red { background: linear-gradient(90deg, var(--red) 50%, transparent 50%); }
     .half-blue { background: linear-gradient(90deg, var(--blue) 50%, transparent 50%); }
     .half-yellow { background: linear-gradient(90deg, var(--yellow) 50%, transparent 50%); }
     .half-cream { background: linear-gradient(90deg, var(--cream) 50%, transparent 50%); }

     .ring-red { border: 3px solid var(--red); background: transparent !important; }
     .ring-blue { border: 3px solid var(--blue); background: transparent !important; }
     .ring-yellow { border: 3px solid var(--yellow); background: transparent !important; }
     .ring-cream { border: 3px solid var(--cream); background: transparent !important; }

     .arc-red { border-color: var(--red); }
     .arc-blue { border-color: var(--blue); }
     .arc-yellow { border-color: var(--yellow); }
     .arc-cream { border-color: var(--cream); }

     /* Controls */
     .controls {
       display: flex;
       justify-content: center;
       align-items: center;
       gap: 0.8rem;
       padding: 0.75rem 1rem;
       flex-wrap: wrap;
       position: relative;
       z-index: 1;
       border-top: 1px solid rgba(255,255,255,0.04);
       background: rgba(0,0,0,0.3);
     }

     .palette {
       display: flex;
       gap: 0.35rem;
       align-items: center;
     }

     .palette-swatch {
       width: 32px;
       height: 32px;
       border-radius: 3px;
       cursor: pointer;
       border: 2px solid transparent;
       transition: all 0.15s ease;
       position: relative;
     }

     .palette-swatch:hover {
       transform: translateY(-2px);
     }

     .palette-swatch.active {
       border-color: var(--cream);
       transform: translateY(-2px);
       box-shadow: 0 2px 8px rgba(0,0,0,0.4);
     }

     .palette-swatch.active::after {
       content: '';
       position: absolute;
       bottom: -5px;
       left: 50%;
       transform: translateX(-50%);
       width: 0;
       height: 0;
       border-left: 4px solid transparent;
       border-right: 4px solid transparent;
       border-top: 4px solid var(--cream);
     }

     .swatch-red { background: var(--red); }
     .swatch-blue { background: var(--blue); }
     .swatch-yellow { background: var(--yellow); }
     .swatch-cream { background: var(--cream); }
     .swatch-black-swatch { background: var(--dark); border: 1px solid var(--mid-gray); }

     .shapes {
       display: flex;
       gap: 0.35rem;
       align-items: center;
     }

     .shape-btn {
       width: 34px;
       height: 34px;
       background: rgba(255,255,255,0.04);
       border: 1px solid rgba(255,255,255,0.08);
       border-radius: 3px;
       cursor: pointer;
       display: flex;
       align-items: center;
       justify-content: center;
       transition: all 0.15s ease;
     }

     .shape-btn:hover {
       background: rgba(255,255,255,0.1);
       border-color: rgba(255,255,255,0.2);
     }

     .shape-btn.active {
       border-color: var(--cream);
       background: rgba(255,255,255,0.12);
     }

     .shape-btn.active::after {
       content: '';
       position: absolute;
       bottom: -3px;
       left: 50%;
       transform: translateX(-50%);
       width: 6px;
       height: 2px;
       background: var(--cream);
     }

     .shape-btn svg {
       width: 16px;
       height: 16px;
       fill: var(--cream);
     }

     .action-btn {
       padding: 0.45rem 0.9rem;
       border-radius: 3px;
       font-size: 0.7rem;
       font-weight: 800;
       font-family: inherit;
       letter-spacing: 1px;
       text-transform: uppercase;
       cursor: pointer;
       border: none;
       transition: all 0.15s ease;
     }

     .btn-play {
       background: var(--blue);
       color: var(--cream);
     }
     .btn-play:hover { background: #1f5099; transform: translateY(-1px); }
     .btn-play:active { transform: translateY(0); }

     .btn-clear {
       background: transparent;
       color: var(--light-gray);
       border: 1px solid rgba(255,255,255,0.12);
     }
     .btn-clear:hover { border-color: var(--red); color: var(--red); }

     .btn-mute {
       background: transparent;
       color: var(--light-gray);
       border: 1px solid rgba(255,255,255,0.08);
       font-size: 0.85rem;
       padding: 0.35rem 0.5rem;
       font-weight: 400;
       letter-spacing: 0;
       text-transform: none;
     }
     .btn-mute:hover { color: var(--cream); border-color: rgba(255,255,255,0.2); }

     .divider-v {
       width: 1px;
       height: 24px;
       background: rgba(255,255,255,0.1);
     }

     /* Progress bar at top */
     .progress-bar {
       position: fixed;
       top: 0;
       left: 0;
       right: 0;
       height: 2px;
       z-index: 50;
     }

     .progress-fill {
       height: 100%;
       width: 0%;
       background: linear-gradient(90deg, var(--red), var(--yellow), var(--blue));
       transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
     }

     /* Counter badge */
     .counter {
       position: fixed;
       top: 8px;
       right: 12px;
       font-size: 0.65rem;
       font-weight: 700;
       color: var(--mid-gray);
       letter-spacing: 1px;
       font-variant-numeric: tabular-nums;
       z-index: 50;
     }

     /* Flash overlay */
     .flash-overlay {
       position: fixed;
       inset: 0;
       pointer-events: none;
       z-index: 100;
       opacity: 0;
     }

     .flash-overlay.active {
       animation: flashPulse 1.2s ease forwards;
     }

     @keyframes flashPulse {
       0% { opacity: 0; background: rgba(242,237,228,0); }
       10% { opacity: 1; background: rgba(242,237,228,0.12); }
       100% { opacity: 0; background: rgba(242,237,228,0); }
     }

     /* Completion overlay */
     .completion-overlay {
       position: fixed;
       inset: 0;
       background: rgba(0,0,0,0.88);
       display: flex;
       align-items: center;
       justify-content: center;
       z-index: 200;
       opacity: 0;
       pointer-events: none;
       transition: opacity 0.3s ease;
     }

     .completion-overlay.visible {
       opacity: 1;
       pointer-events: auto;
     }

     .completion-card {
       text-align: center;
       padding: 2rem 2.5rem;
       position: relative;
     }

     .completion-card::before {
       content: '';
       position: absolute;
       top: -3px;
       left: -3px;
       right: -3px;
       bottom: -3px;
       border: 1px solid rgba(255,255,255,0.06);
     }

     .completion-card h2 {
       font-size: 1.3rem;
       font-weight: 900;
       text-transform: uppercase;
       letter-spacing: 3px;
       margin-bottom: 0.4rem;
     }

     .completion-card h2 .red { color: var(--red); }
     .completion-card h2 .blue { color: var(--blue); }
     .completion-card h2 .yellow { color: var(--yellow); }

     .completion-card p {
       color: var(--mid-gray);
       font-size: 0.8rem;
       margin-bottom: 1.5rem;
       letter-spacing: 1px;
     }

     .completion-card .action-btn {
       margin: 0 0.2rem;
     }

     /* Responsive */
     @media (max-width: 600px) {
       .header { padding: 1.2rem 0.75rem 0.3rem; }
       .controls { gap: 0.4rem; padding: 0.6rem 0.5rem; }
       .palette-swatch { width: 28px; height: 28px; }
       .shape-btn { width: 30px; height: 30px; }
       .shape-btn svg { width: 14px; height: 14px; }
       .action-btn { padding: 0.35rem 0.6rem; font-size: 0.6rem; }
       .divider-v { height: 20px; }
       .grid-wrapper { padding: 5px; }
       .grid-container { gap: 1.5px; }
       .shape-triangle {
         border-left-width: 14px;
         border-right-width: 14px;
         border-bottom-width: 24px;
       }
       .counter { font-size: 0.6rem; right: 8px; top: 6px; }
     }

     @media (max-width: 380px) {
       .palette { gap: 0.2rem; }
       .shapes { gap: 0.2rem; }
       .palette-swatch { width: 24px; height: 24px; }
       .shape-btn { width: 26px; height: 26px; }
     }
   </style>
</head>
<body>
   <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
   <div class="counter" id="counter">0 / 36</div>
   <div class="flash-overlay" id="flashOverlay"></div>

   <div class="header">
     <h1>
       <span class="red">B</span><span class="blue">a</span><span class="yellow">u</span>haus
     </h1>
     <div class="tagline">Geometric Composer</div>
   </div>

   <div class="composition-area">
     <div class="grid-wrapper">
       <div class="grid-container" id="grid" role="grid" aria-label="Composition grid"></div>
     </div>
   </div>

   <div class="controls" role="toolbar" aria-label="Composition tools">
     <div class="palette" aria-label="Color palette">
       <div class="palette-swatch swatch-red active" data-color="red" role="button" aria-label="Red" tabindex="0"></div>
       <div class="palette-swatch swatch-blue" data-color="blue" role="button" aria-label="Blue" tabindex="0"></div>
       <div class="palette-swatch swatch-yellow" data-color="yellow" role="button" aria-label="Yellow" tabindex="0"></div>
       <div class="palette-swatch swatch-cream" data-color="cream" role="button" aria-label="Cream" tabindex="0"></div>
       <div class="palette-swatch swatch-black-swatch" data-color="black" role="button" aria-label="Black" tabindex="0"></div>
     </div>

     <div class="divider-v"></div>

     <div class="shapes" aria-label="Shape selection">
       <button class="shape-btn active" data-shape="circle" aria-label="Circle" title="Circle" tabindex="0">
         <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="7"/></svg>
       </button>
       <button class="shape-btn" data-shape="square" aria-label="Square" title="Square" tabindex="0">
         <svg viewBox="0 0 20 20"><rect x="3" y="3" width="14" height="14"/></svg>
       </button>
       <button class="shape-btn" data-shape="triangle" aria-label="Triangle" title="Triangle" tabindex="0">
         <svg viewBox="0 0 20 20"><polygon points="10,2 18,18 2,18"/></svg>
       </button>
       <button class="shape-btn" data-shape="diagonal" aria-label="Diagonal" title="Diagonal Line" tabindex="0">
         <svg viewBox="0 0 20 20"><line x1="2" y1="18" x2="18" y2="2" stroke="currentColor" stroke-width="2.5"/></svg>
       </button>
       <button class="shape-btn" data-shape="half" aria-label="Half" title="Half Fill" tabindex="0">
         <svg viewBox="0 0 20 20"><rect x="2" y="2" width="8" height="16"/></svg>
       </button>
       <button class="shape-btn" data-shape="ring" aria-label="Ring" title="Ring" tabindex="0">
         <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
       </button>
       <button class="shape-btn" data-shape="arc" aria-label="Arc" title="Arc" tabindex="0">
         <svg viewBox="0 0 20 20"><path d="M 3 17 A 8 8 0 1 1 17 3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
       </button>
     </div>

     <div class="divider-v"></div>

     <button class="action-btn btn-play" id="btnPlay" tabindex="0">▶ Play</button>
     <button class="action-btn btn-clear" id="btnClear" tabindex="0">Reset</button>
     <button class="action-btn btn-mute" id="btnMute" tabindex="0" title="Toggle sound">🔊</button>
   </div>

   <div class="completion-overlay" id="completionOverlay">
     <div class="completion-card">
       <h2>
         <span class="red">C</span><span class="blue">o</span><span class="yellow">m</span>plete
       </h2>
       <p>36 elements — the grid sings</p>
       <button class="action-btn btn-play" id="btnReplay">▶ Replay</button>
       <button class="action-btn btn-clear" id="btnNew">New Canvas</button>
     </div>
   </div>

   <script>
     (function() {
       'use strict';

       var GRID_SIZE = 6;
       var TOTAL_CELLS = GRID_SIZE * GRID_SIZE;
       var grid = [];
       var selectedColor = 'red';
       var selectedShape = 'circle';
       var audioCtx = null;
       var muted = false;
       var placedCount = 0;
       var isPlaying = false;

       // Extended pentatonic/harmonic mapping
       var COLOR_NOTES = {
         red: 261.63,
         blue: 293.66,
         yellow: 349.23,
         cream: 392.00,
         black: 440.00
       };

       // Shape modifies timbre and octave
       var SHAPE_CONFIG = {
         circle:   { octave: 0, wave: 'sine', harmonics: [1, 2] },
         square:   { octave: 1, wave: 'triangle', harmonics: [1, 1.5] },
         triangle: { octave: 0.5, wave: 'square', harmonics: [1, 2, 3] },
         diagonal: { octave: -0.5, wave: 'sawtooth', harmonics: [1] },
         half:     { octave: 1, wave: 'triangle', harmonics: [1, 2] },
         ring:     { octave: 0, wave: 'sine', harmonics: [1, 3] },
         arc:      { octave: 1.5, wave: 'sine', harmonics: [1, 1.5, 2] }
       };

       // --- Audio Engine ---
       function initAudio() {
         if (!audioCtx) {
           audioCtx = new (window.AudioContext || window.webkitAudioContext)();
         }
         if (audioCtx.state === 'suspended') {
           audioCtx.resume();
         }
       }

       function playTone(color, shape, duration, delay) {
         if (muted || !audioCtx) return null;
         var baseFreq = COLOR_NOTES[color] || 261.63;
         var cfg = SHAPE_CONFIG[shape] || SHAPE_CONFIG.circle;
         var freq = baseFreq * Math.pow(2, cfg.octave);
         var now = audioCtx.currentTime + (delay || 0);
         var dur = duration || 0.3;

         var masterGain = audioCtx.createGain();
         masterGain.gain.setValueAtTime(0, now);
         masterGain.gain.linearRampToValueAtTime(0.08, now + 0.015);
         masterGain.gain.exponentialRampToValueAtTime(0.001, now + dur);
         masterGain.connect(audioCtx.destination);

         cfg.harmonics.forEach(function(harm, i) {
           var osc = audioCtx.createOscillator();
           var g = audioCtx.createGain();
           osc.type = i === 0 ? cfg.wave : 'sine';
           osc.frequency.setValueAtTime(freq * harm, now);
           g.gain.setValueAtTime(i === 0 ? 0.6 : (0.2 / (i + 1)), now);
           osc.connect(g);
           g.connect(masterGain);
           osc.start(now);
           osc.stop(now + dur + 0.05);
         });

         return masterGain;
       }

       function playPlaceTone(color, shape) {
         return playTone(color, shape, 0.3);
       }

       function playRemoveTone() {
         if (muted || !audioCtx) return;
         var now = audioCtx.currentTime;
         var osc = audioCtx.createOscillator();
         var gain = audioCtx.createGain();
         osc.type = 'triangle';
         osc.frequency.setValueAtTime(200, now);
         osc.frequency.exponentialRampToValueAtTime(80, now + 0.12);
         gain.gain.setValueAtTime(0.05, now);
         gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
         osc.connect(gain);
         gain.connect(audioCtx.destination);
         osc.start(now);
         osc.stop(now + 0.12);
       }

       function playSelectionTone(color) {
         playTone(color, 'circle', 0.15, 0);
       }

       function playHoverTone() {
         if (muted || !audioCtx) return;
         var now = audioCtx.currentTime;
         var osc = audioCtx.createOscillator();
         var gain = audioCtx.createGain();
         osc.type = 'sine';
         osc.frequency.setValueAtTime(1000, now);
         gain.gain.setValueAtTime(0.008, now);
         gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
         osc.connect(gain);
         gain.connect(audioCtx.destination);
         osc.start(now);
         osc.stop(now + 0.03);
       }

       function playCompletionFanfare() {
         if (muted || !audioCtx) return;
         var now = audioCtx.currentTime;
         var chord = [261.63, 329.63, 392.00, 523.25, 659.25];
         chord.forEach(function(freq, i) {
           var osc = audioCtx.createOscillator();
           var g = audioCtx.createGain();
           osc.type = 'sine';
           osc.frequency.setValueAtTime(freq, now);
           g.gain.setValueAtTime(0, now + i * 0.08);
           g.gain.linearRampToValueAtTime(0.04, now + i * 0.08 + 0.02);
           g.gain.exponentialRampToValueAtTime(0.001, now + 2);
           osc.connect(g);
           g.connect(audioCtx.destination);
           osc.start(now + i * 0.08);
           osc.stop(now + 2.2);
         });
       }

       function playResetTone() {
         if (muted || !audioCtx) return;
         var now = audioCtx.currentTime;
         var osc = audioCtx.createOscillator();
         var g = audioCtx.createGain();
         osc.type = 'sine';
         osc.frequency.setValueAtTime(500, now);
         osc.frequency.exponentialRampToValueAtTime(100, now + 0.25);
         g.gain.setValueAtTime(0.06, now);
         g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
         osc.connect(g);
         g.connect(audioCtx.destination);
         osc.start(now);
         osc.stop(now + 0.25);
       }

       // --- Grid initialization ---
       var gridEl = document.getElementById('grid');
       var progressFill = document.getElementById('progressFill');
       var counterEl = document.getElementById('counter');
       var flashOverlay = document.getElementById('flashOverlay');
       var completionOverlay = document.getElementById('completionOverlay');

       for (var i = 0; i < TOTAL_CELLS; i++) {
         var cell = document.createElement('div');
         cell.className = 'cell';
         cell.dataset.index = i;
         cell.setAttribute('role', 'gridcell');
         cell.setAttribute('tabindex', '0');
         cell.setAttribute('aria-label', 'Row ' + (Math.floor(i / GRID_SIZE) + 1) + ', Column ' + (i % GRID_SIZE + 1));
         cell.addEventListener('click', onCellClick);
         cell.addEventListener('mouseenter', throttle(onCellHover, 100));
         cell.addEventListener('keydown', onCellKey);
         gridEl.appendChild(cell);
         grid.push({ el: cell, data: null });
       }

       function throttle(fn, ms) {
         var last = 0;
         return function() {
           var now = Date.now();
           if (now - last >= ms) { last = now; fn.apply(this, arguments); }
         };
       }

       function onCellHover(e) {
         if (isPlaying) return;
         var idx = parseInt(e.currentTarget.dataset.index);
         if (!grid[idx].data) {
           playHoverTone();
         }
       }

       function onCellKey(e) {
         if (e.key === 'Enter' || e.key === ' ') {
           e.preventDefault();
           onCellClick(e);
         }
       }

       function onCellClick(e) {
         if (isPlaying) return;
         initAudio();
         var idx = parseInt(e.currentTarget.dataset.index);
         var cellData = grid[idx];
         if (cellData.data) {
           removeShape(idx);
         } else {
           placeShape(idx);
         }
       }

       function placeShape(idx) {
         var cellData = grid[idx];
         var color = selectedColor;
         var shape = selectedShape;
         cellData.data = { color: color, shape: shape, row: Math.floor(idx / GRID_SIZE), col: idx % GRID_SIZE };

         var content = document.createElement('div');
         content.className = 'cell-content';

         var shapeEl = createShapeElement(shape, color);
         content.appendChild(shapeEl);

         var existing = cellData.el.querySelector('.cell-content');
         if (existing) existing.remove();
         cellData.el.appendChild(content);
         cellData.el.classList.add('filled');

         playPlaceTone(color, shape);
         recalcCount();

         if (placedCount === TOTAL_CELLS) {
           setTimeout(triggerCompletion, 350);
         }
       }

       function removeShape(idx) {
         var cellData = grid[idx];
         if (!cellData.data) return;
         var existing = cellData.el.querySelector('.cell-content');
         if (existing) {
           existing.style.animation = 'removeOut 0.18s ease forwards';
           setTimeout(function() { if (existing.parentNode) existing.remove(); }, 180);
         }
         cellData.el.classList.remove('filled');
         cellData.data = null;
         playRemoveTone();
         recalcCount();
         if (completionOverlay.classList.contains('visible')) {
           completionOverlay.classList.remove('visible');
         }
       }

       function recalcCount() {
         placedCount = 0;
         for (var i = 0; i < grid.length; i++) {
           if (grid[i].data) placedCount++;
         }
         var pct = (placedCount / TOTAL_CELLS) * 100;
         progressFill.style.width = pct + '%';
         counterEl.textContent = placedCount + ' / ' + TOTAL_CELLS;
       }

       function createShapeElement(shape, color) {
         var el = document.createElement('div');
         var colorKey = color === 'black' ? 'black' : color;
         switch (shape) {
           case 'circle':
             el.className = 'shape-circle color-' + color;
             break;
           case 'square':
             el.className = 'shape-square color-' + color;
             break;
           case 'triangle':
             el.className = 'shape-triangle border-' + colorKey;
             break;
           case 'diagonal':
             el.className = 'shape-diagonal';
             var lineEl = document.createElement('div');
             lineEl.className = 'line';
              var colorMap = { red: '#D93838', blue: '#2962AD', yellow: '#E8B828', cream: '#F2EDE4', black: '#6B6B6B' };
             lineEl.style.background = colorMap[color] || '#6B6B6B';
             el.appendChild(lineEl);
             break;
           case 'half':
             el.className = 'shape-half half-' + color;
             break;
           case 'ring':
             el.className = 'shape-ring ring-' + color;
             break;
           case 'arc':
             el.className = 'shape-arc arc-' + color;
             break;
         }
         return el;
       }

       function triggerCompletion() {
         playCompletionFanfare();
         flashOverlay.classList.remove('active');
         void flashOverlay.offsetWidth;
         flashOverlay.classList.add('active');
         setTimeout(function() {
           flashOverlay.classList.remove('active');
         }, 1400);
         setTimeout(function() {
           completionOverlay.classList.add('visible');
         }, 600);
       }

       // --- Tool controls ---
       var swatches = document.querySelectorAll('.palette-swatch');
       swatches.forEach(function(sw) {
         sw.addEventListener('click', function() {
           swatches.forEach(function(s) { s.classList.remove('active'); });
           sw.classList.add('active');
           selectedColor = sw.dataset.color;
           initAudio();
           playSelectionTone(selectedColor);
         });
         sw.addEventListener('keydown', function(e) {
           if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); sw.click(); }
         });
       });

       var shapeBtns = document.querySelectorAll('.shape-btn');
       shapeBtns.forEach(function(btn) {
         btn.addEventListener('click', function() {
           shapeBtns.forEach(function(b) { b.classList.remove('active'); });
           btn.classList.add('active');
           selectedShape = btn.dataset.shape;
           initAudio();
         });
         btn.addEventListener('keydown', function(e) {
           if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btn.click(); }
         });
       });

       // --- Action buttons ---
       document.getElementById('btnClear').addEventListener('click', function() {
         initAudio();
         playResetTone();
         for (var i = 0; i < grid.length; i++) {
           var existing = grid[i].el.querySelector('.cell-content');
           if (existing) existing.remove();
           grid[i].el.classList.remove('filled');
           grid[i].el.classList.remove('playing');
           grid[i].data = null;
         }
         placedCount = 0;
         recalcCount();
         completionOverlay.classList.remove('visible');
         isPlaying = false;
       });

       document.getElementById('btnPlay').addEventListener('click', function() {
         if (isPlaying) return;
         initAudio();
         playCompositionSequence();
       });

       document.getElementById('btnMute').addEventListener('click', function() {
         muted = !muted;
         this.textContent = muted ? '🔇' : '🔊';
         this.setAttribute('aria-label', muted ? 'Unmute sound' : 'Mute sound');
       });

        document.getElementById('btnReplay').addEventListener('click', function() {
          completionOverlay.classList.remove('visible');
          setTimeout(playCompositionSequence, 300);
        });

       document.getElementById('btnNew').addEventListener('click', function() {
         completionOverlay.classList.remove('visible');
         document.getElementById('btnClear').click();
       });

        // Play sequence: diagonal wave traversal with chord resolution
       var playingTimeouts = [];
       function clearPlayingTimeouts() {
         playingTimeouts.forEach(function(t) { clearTimeout(t); });
         playingTimeouts = [];
       }
       function playCompositionSequence() {
          clearPlayingTimeouts();
          var filledCells = [];
          for (var i = 0; i < grid.length; i++) {
            if (grid[i].data) filledCells.push(i);
           }
          if (filledCells.length === 0) return;

          isPlaying = true;

          // Sort by diagonal wave: (row + col) ascending, then by row
          filledCells.sort(function(a, b) {
            var da = grid[a].data, db = grid[b].data;
            var sumA = da.row + da.col, sumB = db.row + db.col;
            if (sumA !== sumB) return sumA - sumB;
            return da.row - db.row;
           });

          var baseDelay = Math.max(40, 350 / filledCells.length);

          filledCells.forEach(function(idx, order) {
            var d = grid[idx].data;
            // Subtle rhythm: faster on even diagonals, slight pause on boundary
            var diagSum = d.row + d.col;
            var rhythmicModifier = (diagSum % 2 === 0) ? 0 : 12;
            var delay = order * baseDelay + rhythmicModifier;

            var t = setTimeout(function() {
              var cellEl = grid[idx].el;
              cellEl.classList.add('playing');
              playTone(d.color, d.shape, 0.35, 0);
              var cleanup = setTimeout(function() {
                cellEl.classList.remove('playing');
              }, 180);
              playingTimeouts.push(cleanup);

              // On last note, play harmonic resolution chord
              if (order === filledCells.length - 1) {
                var resolve = setTimeout(function() {
                  isPlaying = false;
                  playResolutionChord();
                 }, 250);
                playingTimeouts.push(resolve);
               }
             }, delay);
            playingTimeouts.push(t);
           });
         }

        // Resolution chord: all unique colors in composition played together
       function playResolutionChord() {
          if (muted || !audioCtx) return;
          var uniqueColors = [];
          for (var i = 0; i < grid.length; i++) {
            if (grid[i].data) {
              var c = grid[i].data.color;
              if (uniqueColors.indexOf(c) === -1) uniqueColors.push(c);
             }
           }
          var now = audioCtx.currentTime;
          uniqueColors.forEach(function(color, i) {
            var freq = (COLOR_NOTES[color] || 261.63) * 2;
            var osc = audioCtx.createOscillator();
            var g = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now);
            g.gain.setValueAtTime(0, now);
            g.gain.linearRampToValueAtTime(0.05, now + 0.04);
            g.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
            osc.connect(g);
            g.connect(audioCtx.destination);
            osc.start(now + i * 0.04);
            osc.stop(now + 1.6);
           });

          // Sustain shimmer
          var shimmer = audioCtx.createOscillator();
          var sg = audioCtx.createGain();
          shimmer.type = 'sine';
          shimmer.frequency.setValueAtTime(1200, now);
          shimmer.frequency.exponentialRampToValueAtTime(800, now + 0.8);
          sg.gain.setValueAtTime(0, now);
          sg.gain.linearRampToValueAtTime(0.015, now + 0.05);
          sg.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
          shimmer.connect(sg);
          sg.connect(audioCtx.destination);
          shimmer.start(now);
          shimmer.stop(now + 0.9);
         }

       // --- Keyboard navigation: toolbar ---
       document.querySelector('.controls').addEventListener('keydown', function(e) {
         if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
           var focusable = Array.from(document.querySelectorAll('.controls [tabindex="0"]'));
           var currentIdx = focusable.indexOf(document.activeElement);
           if (currentIdx === -1) return;
           var nextIdx = e.key === 'ArrowRight'
             ? Math.min(currentIdx + 1, focusable.length - 1)
             : Math.max(currentIdx - 1, 0);
           focusable[nextIdx].focus();
           e.preventDefault();
         }
       });

       // --- Keyboard navigation: grid ---
       gridEl.addEventListener('keydown', function(e) {
         var currentEl = document.activeElement;
         if (!currentEl || !currentEl.classList.contains('cell')) return;
         var idx = parseInt(currentEl.dataset.index);
         var nextIdx = -1;

         if (e.key === 'ArrowRight') nextIdx = (idx % GRID_SIZE < GRID_SIZE - 1) ? idx + 1 : idx;
         else if (e.key === 'ArrowLeft') nextIdx = (idx % GRID_SIZE > 0) ? idx - 1 : idx;
         else if (e.key === 'ArrowDown') nextIdx = (idx + GRID_SIZE < TOTAL_CELLS) ? idx + GRID_SIZE : idx;
         else if (e.key === 'ArrowUp') nextIdx = (idx - GRID_SIZE >= 0) ? idx - GRID_SIZE : idx;

         if (nextIdx >= 0 && nextIdx < TOTAL_CELLS && nextIdx !== idx) {
           grid[nextIdx].el.focus();
           e.preventDefault();
         }
       });

       // Touch: prevent double-tap zoom
       var lastTouch = 0;
       gridEl.addEventListener('touchend', function(e) {
         var now = Date.now();
         if (now - lastTouch < 300) e.preventDefault();
         lastTouch = now;
       }, false);

     })();
   </script>
</body>
</html>
