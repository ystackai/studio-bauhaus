<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bauhaus Composer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://ystackai.com/shared/studio-theme.css">
    <link rel="stylesheet" href="https://ystackai.com/shared/platform.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            touch-action: none;
            user-select: none;
        }
        canvas#composer {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui-panel {
            position: fixed;
            top: 12px;
            right: 12px;
            background: rgba(26,26,26,0.92);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.12);
            padding: 14px 16px;
            z-index: 100;
            min-width: 180px;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #ui-panel.visible { opacity: 1; }
        #ui-panel .label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #888;
        }
        .color-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .color-swatch {
            width: 28px; height: 28px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.1s;
        }
        .color-swatch:hover { transform: scale(1.1); }
        .color-swatch.active { border-color: #fff; }
        .shape-row { display: flex; gap: 6px; }
        .shape-btn {
            width: 32px; height: 32px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent; color: #ccc;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.1s, border-color 0.1s;
            font-size: 16px;
        }
        .shape-btn:hover { background: rgba(255,255,255,0.1); }
        .shape-btn.active { border-color: #fff; background: rgba(255,255,255,0.15); }
        #size-slider {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 4px;
            background: rgba(255,255,255,0.2);
            outline: none;
        }
        #size-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 14px; height: 14px;
            background: #fff; cursor: pointer;
        }
        #size-slider::-moz-range-thumb {
            width: 14px; height: 14px;
            background: #fff; cursor: pointer;
        }
        .size-value { font-size: 11px; color: #aaa; min-width: 24px; text-align: right; }
        .action-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .action-btn {
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent; color: #ccc;
            cursor: pointer;
            font-size: 11px; font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: background 0.1s, border-color 0.1s;
        }
        .action-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }
        #help-tip {
            position: fixed;
            bottom: 16px; left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.35);
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            text-align: center;
            transition: opacity 2s;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
        }
        @media (max-width: 600px) {
            #ui-panel { top: 8px; right: 8px; padding: 10px 12px; min-width: 120px; gap: 8px; }
            .color-swatch { width: 24px; height: 24px; }
            .shape-btn { width: 28px; height: 28px; font-size: 14px; }
            .action-btn { padding: 4px 10px; font-size: 10px; }
            #help-tip { font-size: 10px; bottom: 10px; }
        }
    </style>
</head>
<body>
    <canvas id="composer"></canvas>

    <div id="ui-panel">
        <div><span class="label">Color</span></div>
        <div class="color-row" id="color-swatches"></div>
        <div><span class="label">Shape</span></div>
        <div class="shape-row" id="shape-btns"></div>
        <div><span class="label">Size</span></div>
        <div style="display:flex;align-items:center;gap:6px">
            <input type="range" id="size-slider" min="10" max="400" value="60">
            <span class="size-value" id="size-value">60</span>
        </div>
        <div class="action-row">
            <button class="action-btn" id="btn-undo">↩ Undo</button>
            <button class="action-btn" id="btn-redo">↪ Redo</button>
        </div>
        <div class="action-row">
            <button class="action-btn" id="btn-random">🎲 Random</button>
            <button class="action-btn" id="btn-clear">✕ Clear</button>
            <button class="action-btn" id="btn-grid">Grid On</button>
            <button class="action-btn" id="btn-export">⬇ PNG</button>
        </div>
    </div>

    <div id="help-tip">Click to place · drag to move · scroll to resize · r rotate · d delete</div>

    <script src="script.js"></script>
</body>
</html>
