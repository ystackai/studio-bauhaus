<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhythmic Grid</title>
<style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #F5F0E6; cursor: none; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
'use strict';

/* ═══════════════════════════════════════════════════════════
   CONFIGURATION — tuned for "felt" tactile cadence
    ═════════════════════════════════════════════════════════ */
const GRID_SPACING          = 64;      // grid cell size (px)
const SNAP_RADIUS           = 8;       // snap-to-grid proximity (px)
const REST_INTERVAL         = 12;      // micro-rest between snaps (ms)
const CURSOR_RADIUS         = 6;

// Grip/glide friction — multiplicative retention each frame (< 1 = decay)
const FRICTION_IDLE         = 0.90;    // idle residual decay
const FRICTION_GRIP_PEAK    = 0.45;    // peak grip retention (~loses half velocity/frame)
const FRICTION_GRIP_BASE    = 0.82;    // baseline grip (at rest, post-peak)
const GRIP_DURATION_MS      = 130;     // how long peak resistance lasts
const GLIDE_RETENTION       = 0.95;    // glide: light friction for smooth slide

// Linen motion blur ceiling
const MOTION_BLUR_STRENGTH = 4.0;       // max blur radius (px) at peak velocity

// C-Major harmonic stack — warm sine bed
const HARMONICS     = [261.63, 329.63, 392.00, 523.25, 659.25];
const HARM_VOL      = [0.18,      0.12,      0.10,      0.06,      0.04     ];

/* ═══════════════════════════════════════════════════════════
   CANVAS SETUP
    ═════════════════════════════════════════════════════════ */
const canvas = document.getElementById('c');
const ctx     = canvas.getContext('2d', { alpha: false });

let W, H, dpr;
let linenBgCanvas = null;                   // full-screen pre-rendered linen background

/* ── Resize handler ─────────────────────────────────────── */
function resize() {
  dpr          = window.devicePixelRatio || 1;
  W            = window.innerWidth;
  H            = window.innerHeight;
  canvas.width      = W * dpr;
  canvas.height     = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  generateLinen();
}
window.addEventListener('resize', resize);

/* ═══════════════════════════════════════════════════════════
   LINEN GRAIN — procedural weave (Canvas 2D, fast render)
    ═════════════════════════════════════════════════════════ */
const TILE = 16;                           // small tile for GPU-accelerated pattern repeat

function generateLinen() {
  // Build a single tile with warp + weft threads simulating linen over/under weave
  const tc = document.createElement('canvas');
  tc.width   = TILE; tc.height = TILE;
  const tctx = tc.getContext('2d');

  const BR = 245, BG = 240, BB = 230;      // #F5F0E6 oatmeal base

    // Base fill (oatmeal/cream)
  tctx.fillStyle = `rgb(${BR},${BG},${BB})`;
  tctx.fillRect(0, 0, TILE, TILE);

    // Warp threads — horizontal fibres, over/under grain variation
  for (let y = 1; y < TILE; y += 2) {
    const a   = 0.10 + Math.random() * 0.06;
    const sh  = -4 + Math.floor(Math.random() * 8);
    tctx.fillStyle = `rgba(${BR+sh},${BG+sh},${BB+sh},${a})`;
    tctx.fillRect(0, y, TILE, 1);
   }

    // Weft threads — vertical fibres, interlocked with warp at crossings
  for (let x = 1; x < TILE; x += 2) {
    const a   = 0.08 + Math.random() * 0.05;
    const sh  = -6 + Math.floor(Math.random() * 10);
    tctx.fillStyle = `rgba(${BR+sh},${BG+sh},${BB+sh},${a})`;

      // Skip pixel at crossings: vertical lines pass UNDER horizontal ones
    for (let wy = 0; wy < TILE; wy++) {
      if ((wy % 2) === (x % 2)) continue;   // crossing pixel — under the warp
      tctx.fillRect(x, wy, 1, 1);
     }
   }

    // Organic noise grain for fibre character
  const img    = tctx.getImageData(0, 0, TILE, TILE);
  const d      = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (Math.random() - 0.5) * 6;
    d[i]       = Math.max(0, Math.min(255, d[i]       + n));
    d[i + 1] = Math.max(0, Math.min(255, d[i + 1] + n));
    d[i + 2] = Math.max(0, Math.min(255, d[i + 2] + n));
   }
  tctx.putImageData(img, 0, 0);

    // ── Full-screen cached background (rendered once, re-used every frame) ──
  linenBgCanvas = document.createElement('canvas');
  linenBgCanvas.width   = W; linenBgCanvas.height = H;
  const bgCtx = linenBgCanvas.getContext('2d');

    // GPU-accelerated createPattern for the repeat tile
  try {
    bgCtx.fillStyle = bgCtx.createPattern(tc, 'repeat');
    if (bgCtx.fillStyle) {
      bgCtx.fillRect(0, 0, W, H);
     } else throw new Error('null pattern');
   } catch (_) {
      // Fallback: manual tile draw
    for (let py = 0; py < H; py += TILE) {
      for (let px = 0; px < W; px += TILE) {
        bgCtx.drawImage(tc, px, py);
       }
     }
   }
}

/* ═══════════════════════════════════════════════════════════
   GRID — static charcoal Cartesian lines (never wobbles)
    ═════════════════════════════════════════════════════════ */
function drawGrid() {
  ctx.strokeStyle = '#2B2B2B';
  ctx.lineWidth      = 0.75;
  ctx.globalAlpha    = 0.55;

  ctx.beginPath();

    // Vertical grid lines (sub-pixel snapped for crispness)
  for (let x = GRID_SPACING; x <= W; x += GRID_SPACING) {
    ctx.moveTo(Math.round(x) + 0.5, 0);
    ctx.lineTo(Math.round(x) + 0.5, H);
   }

    // Horizontal grid lines
  for (let y = GRID_SPACING; y <= H; y += GRID_SPACING) {
    ctx.moveTo(0, Math.round(y) + 0.5);
    ctx.lineTo(W, Math.round(y) + 0.5);
   }

  ctx.stroke();
  ctx.globalAlpha = 1.0;
}

/* ═══════════════════════════════════════════════════════════
   CURSOR CADENCE ENGINE — grip → glide → snap (staccato)
    ═════════════════════════════════════════════════════════ */

// Physics state
let mouseX = 0, mouseY = 0;               // raw mouse position from last event
let cursorX, cursorY;                      // visible dot — spring-integrator state
let velX = 0, velY = 0;                  // velocity integrator (post-damping)

let phase         = 'idle';                // idle | grip | glide
let gripElapsed   = 0;                     // ms elapsed in current grip phase
let snapCD        = 0;                     // timestamp when next snap is allowed
let rawVelMag     = 0;                     // normalized for blur + audio

const IDLE_DEADZONE       = 0.12;          // below this, no phase transition
const SNAP_THRESH_VEL     = 2.5;           // velocity magnitude to break grip → glide
const SPRING_K            = 0.14;          // spring stiffness toward raw mouse pos

/* ── Closest grid intersection (pixel-perfect) ─────────── */
function nearestGridPoint(px, py) {
  const gx = Math.round(px / GRID_SPACING) * GRID_SPACING;
  const gy = Math.round(py / GRID_SPACING) * GRID_SPACING;
  return { x: gx, y: gy, dist: Math.hypot(px - gx, py - gy) };
}

/* ── Core physics — one call per frame at 60 fps ───────── */
function updateCursor(now) {
  const prevX = cursorX;
  const prevY = cursorY;

    // Spring force: pull cursor toward raw mouse position
  const dx = mouseX - cursorX;
  const dy = mouseY - cursorY;
  velX += dx * SPRING_K;                   // spring integrates displacement into velocity
  velY += dy * SPRING_K;

    /* ── Phase transition & friction ─────────────────── */
    // idle → grip on first detectable movement
  if (phase === 'idle') {
    const effMag = Math.hypot(velX, velY);
    if (effMag > IDLE_DEADZONE) {
      phase        = 'grip';
      gripElapsed = 0;
     } else {
       // Pure idle decay — let residual velocity bleed out
      velX *= FRICTION_IDLE;
      velY *= FRICTION_IDLE;
    }
   }

  if (phase === 'grip') {
      gripElapsed += 16.67;                    // ≈ 1 frame at 60 fps

      // Non-linear grip curve: peak resistance decays smoothly to baseline
    const gripT        = Math.min(1, gripElapsed / GRIP_DURATION_MS);
    const gripPeakDecay = FRICTION_GRIP_PEAK * (1 - gripT) + FRICTION_GRIP_BASE * gripT;

      // velocity *= factor < 1 → decay. At peak: loses ~55%/frame, at rest: loses ~18%/frame
    velX *= Math.max(0.30, gripPeakDecay);
    velY *= Math.max(0.30, gripPeakDecay);

      // Grip → glide once we've sustained enough speed past the threshold
    const effMag = Math.hypot(velX, velY);
    if (effMag > SNAP_THRESH_VEL && gripElapsed > 40) {
      phase = 'glide';
     }
   }

  if (phase === 'glide') {
      // Glide: very light friction for fluid slide with material weight
    velX *= GLIDE_RETENTION;
    velY *= GLIDE_RETENTION;

      // Stay in glide while moving above deadzone
    const effMag = Math.hypot(velX, velY);
    if (effMag < IDLE_DEADZONE * 0.15) {
      phase = 'idle';
      velX = 0; velY = 0;
     }
   }

    // Propose new position from integrated velocity
  const nx = cursorX + velX;
  const ny = cursorY + velY;

    /* ── SNAP — staccato grid alignment (no bounce, no elasticity) ─ */
  const ngp    = nearestGridPoint(nx, ny);
  if (now >= snapCD && ngp.dist < SNAP_RADIUS) {
      // Instant pixel-perfect snap to grid intersection
    cursorX = ngp.x;
    cursorY = ngp.y;
    velX       = 0;
    velY       = 0;

    snapCD   = now + REST_INTERVAL;          // enforce exact 12 ms micro-rest
    phase    = 'idle';                        // reset cadence for next movement cycle

      // Web Audio chime — off main thread, sub-ms precision
    if (window._aCtx && window._aOn) {
      playSnapChime();
     }
   } else {
    cursorX = nx;
    cursorY = ny;
   }

    // Track effective velocity for blur & audio mapping
  rawVelMag = Math.hypot(velX, velY);
}

/* ═══════════════════════════════════════════════════════════
   VISUAL ACCENTS — indigo proximity ring + mustard dot
    ═════════════════════════════════════════════════════════ */

function drawHighlights() {
  const ngp = nearestGridPoint(cursorX, cursorY);
  if (ngp.dist < SNAP_RADIUS * 1.8) {
    const t      = Math.min(1, 1 - ngp.dist / (SNAP_RADIUS * 1.8));
    const op     = HIGHLIGHT_OPACITY_MIN + t * (HIGHLIGHT_OPACITY_MAX - HIGHLIGHT_OPACITY_MIN);

    ctx.globalAlpha = op;
    ctx.fillStyle     = '#4B0082';           // indigo proximity ring

      // Outer halo at grid intersection
    ctx.beginPath();
    ctx.arc(ngp.x, ngp.y, SNAP_RADIUS * 1.6, 0, Math.PI * 2);
    ctx.fill();

      // Inner dot — higher opacity so snap target reads clearly
    ctx.globalAlpha = Math.min(1, op * 1.4);
    ctx.beginPath();
    ctx.arc(ngp.x, ngp.y, 3.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1.0;
   }
}

function drawCursor() {
    // Mustard yellow (#E1AD01) geometric dot with soft radial glow
  const g = ctx.createRadialGradient(cursorX, cursorY, 0, cursorX, cursorY, CURSOR_RADIUS * 2.5);
  g.addColorStop(0,     'rgba(225,173,1,0.95)');
  g.addColorStop(0.4, 'rgba(225,173,1,0.55)');
  g.addColorStop(1,     'rgba(225,173,1,0)');

  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(cursorX, cursorY, CURSOR_RADIUS * 2.5, 0, Math.PI * 2);
  ctx.fill();

    // Core — solid crisp geometric dot (never outline, never stroke)
  ctx.fillStyle = '#E1AD01';
  ctx.beginPath();
  ctx.arc(cursorX, cursorY, CURSOR_RADIUS, 0, Math.PI * 2);
  ctx.fill();
}

/* ═══════════════════════════════════════════════════════════
   WEB AUDIO — C-MAJOR DRONE (sine harmonic stack)
    ═════════════════════════════════════════════════════════ */
window._aCtx       = null;                // AudioContext instance
window._aOn        = false;               // audio has been activated
let droneOscillators = [];                 // {osc, gain} per harmonic
let masterGainNode   = null;

function initAudio() {
  if (window._aCtx) return;

  const Ctx    = window.AudioContext || window.webkitAudioContext;
  window._aCtx = new Ctx();

    // Master volume — modulated each frame by cursor velocity
  masterGainNode = window._aCtx.createGain();
  masterGainNode.gain.value = 0;
  masterGainNode.connect(window._aCtx.destination);

    // Low-pass warmth filter (~800 Hz crossover)
  const lp = window._aCtx.createBiquadFilter();
  lp.type          = 'lowpass';
  lp.frequency.value = 850;
  lp.Q.value       = 0.6;
  lp.connect(masterGainNode);

    // Five oscillators — C4 E4 G4 C5 E5 (C-major triad + extension)
  HARMONICS.forEach((freq, i) => {
    const osc      = window._aCtx.createOscillator();
    const gain     = window._aCtx.createGain();

    osc.type         = 'sine';
    osc.frequency.value = freq;
      // Organic warmth: ±12 cent random detune per oscillator (chorus-like)
    osc.detune.value    = (Math.random() - 0.5) * 24;
    gain.gain.value     = HARM_VOL[i] || 0.05;

    osc.connect(gain);
    gain.connect(lp);
    osc.start();

    droneOscillators.push({ osc, gain });
   });

  window._aOn = true;
}

function updateDroneVol(velocityMag) {
  if (!masterGainNode || !window._aCtx) return;
    // Silent when still (vel ~0), full volume at max velocity (~15-20px/frame)
  const tgt     = Math.min(1, velocityMag * 0.06);
  masterGainNode.gain.setTargetAtTime(tgt, window._aCtx.currentTime, 0.03);
}

/* ── Snap chime — glass-like percussive transient (2400-3200 Hz) ─ */
function playSnapChime() {
  const ac    = window._aCtx;
  if (!ac) return;
  const now   = ac.currentTime;

    // Multi-harmonic glass tap: primary transient + shimmer + body
  const specs = [
     { freq: 2800, dur: 0.045, amp: 0.28 },   // primary transient burst
     { freq: 3150, dur: 0.035, amp: 0.20 },   // shimmer overtone (~2700-3200 range)
     { freq: 1700, dur: 0.06,  amp: 0.12 },   // sub-bass body resonance
     { freq: 5600, dur: 0.025, amp: 0.07 },   // high shimmer sparkle
   ];

  specs.forEach(s => {
    const osc      = ac.createOscillator();
    const gain     = ac.createGain();

    osc.type         = 'sine';
    osc.frequency.setValueAtTime(s.freq, now);
      // Micro downward pitch sweep → glass tap character
    osc.frequency.exponentialRampToValueAtTime(
      s.freq * 0.968, now + s.dur);

    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(s.amp, now + 0.001);    // sub-ms attack (crisp!)
    gain.gain.exponentialRampToValueAtTime(0.001, now + s.dur);  // natural decay tail

    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start(now);
    osc.stop(now + s.dur + 0.005);
   });
}

/* ═══════════════════════════════════════════════════════════
   MOUSE TRACKING — raw input carrier (event → spring delta)
    ═════════════════════════════════════════════════════════ */
function onMouseMove(e) {
  if (!window._aOn) initAudio();

  mouseX = e.clientX;
  mouseY = e.clientY;
}
document.addEventListener('mousemove', onMouseMove);

/* ═══════════════════════════════════════════════════════════
   RENDER LOOP — target 60 fps, <16 ms frame budget
    ═════════════════════════════════════════════════════════ */
let rafId         = null;
let lastTs        = 0;
let blurSmoothVal = 0;                       // exponentially smoothed blur radius

function frame(ts) {
  rafId   = requestAnimationFrame(frame);
  lastTs  = ts;

    /* ── Physics (cursor cadence engine) ─────────────── */
  updateCursor(ts);

    /* ── Render pipeline — back → front layers ────────── */

    // 1 BACKGROUND — linen grain with velocity-dependent motion blur
  if (linenBgCanvas) {
    const tgtBlur = Math.min(MOTION_BLUR_STRENGTH, rawVelMag * 0.15);
    blurSmoothVal += (tgtBlur - blurSmoothVal) * 0.12;

    if (blurSmoothVal > 0.08) {
      ctx.filter     = `blur(${blurSmoothVal.toFixed(2)}px)`;
      ctx.drawImage(linenBgCanvas, 0, 0, W, H);
      ctx.filter     = 'none';
     } else {
      ctx.drawImage(linenBgCanvas, 0, 0, W, H);
     }
   }

    // 2 GRID — static charcoal lines over linen (never shifts)
  drawGrid();

    // 3 ACCENTS — indigo proximity highlight at nearest intersection
  drawHighlights();

    // 4 CURSOR — mustard yellow geometric dot (primary indicator)
  drawCursor();

    // 5 AUDIO — velocity-driven drone volume modulation
  updateDroneVol(rawVelMag);
}

/* ═══════════════════════════════════════════════════════════
   AUDIO ACTIVATION — first user gesture (browser autoplay)
    ═════════════════════════════════════════════════════════ */
function onActivateAudio() {
  if (!window._aOn) initAudio();
}

document.addEventListener('mousedown',  onActivateAudio);
document.addEventListener('touchstart', onActivateAudio);
document.addEventListener('keydown',    onActivateAudio);

/* ═══════════════════════════════════════════════════════════
   INIT — boot the experience
    ═════════════════════════════════════════════════════════ */
resize();

cursorX   = W / 2;
cursorY   = H / 2;
mouseX    = cursorX;
mouseY    = cursorY;

lastTs    = performance.now();
rafId     = requestAnimationFrame(frame);

})();
</script>
</body>
</html>
