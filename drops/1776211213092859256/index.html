<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Resonant Linen</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: monospace;
      color: #fff;
    }
    
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    
    #debug {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      font-size: 12px;
      pointer-events: none;
    }
    
    #instructions {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      font-size: 12px;
      max-width: 300px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="debug">Debug: <span id="debug-text">-</span></div>
  <div id="instructions">
    Move cursor to trigger grid strain<br>
    3-second cycle: Load → Breath → Snap → Rest
  </div>

  <script>
    // Main application
    (function() {
      const canvas = document.getElementById('canvas');
      const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
      const debugText = document.getElementById('debug-text');
      
      if (!gl) {
        alert('WebGL not supported');
        return;
      }
      
      // Set canvas size
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      
      // Vertex shader source
      const vsSource = `
        precision highp float;
        attribute vec2 aPosition;
        uniform vec2 uResolution;
        uniform float uTime;
        uniform float uStrain;
        
        void main() {
          vec2 position = aPosition;
          
          // Add jitter effect when strained
          if (uStrain > 0.0) {
            float jitter = sin(uTime * 10.0 + position.x * 0.1) * uStrain * 0.02;
            position.y += jitter;
          }
          
          // Normalize to clip space
          vec2 clipSpace = (position / uResolution) * 2.0 - 1.0;
          gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
        }
      `;
      
      // Fragment shader source
      const fsSource = `
        precision highp float;
        uniform float uTime;
        uniform float uStrain;
        uniform vec2 uResolution;
        
        void main() {
          vec2 uv = gl_FragCoord.xy / uResolution;
          
          // Create grid pattern
          vec2 grid = mod(uv * 50.0, 1.0);
          
          // Add linen texture effect
          float grain = sin(uv.x * 100.0) * sin(uv.y * 100.0) * 0.02;
          
          // Create grid lines
          float line = min(grid.x, grid.y);
          float gridLine = smoothstep(0.0, 0.05, line);
          
          // Apply strain effect
          float strainEffect = uStrain * 0.5;
          gridLine = gridLine * (1.0 - strainEffect) + strainEffect * 0.8;
          
          // Color based on strain
          vec3 color = vec3(0.2, 0.2, 0.2);
          if (uStrain > 0.0) {
            // Yellow to red as strain increases
            color = mix(vec3(0.8, 0.6, 0.0), vec3(0.8, 0.0, 0.0), uStrain);
          }
          
          // Add grain effect
          color += vec3(grain * uStrain);
          
          gl_FragColor = vec4(color, 1.0);
        }
      `;
      
      // Compile shader
      function compileShader(source, type) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          console.error('Shader compilation error:', gl.getShaderInfoLog(shader));
          gl.deleteShader(shader);
          return null;
        }
        
        return shader;
      }
      
      // Create shader program
      const vertexShader = compileShader(vsSource, gl.VERTEX_SHADER);
      const fragmentShader = compileShader(fsSource, gl.FRAGMENT_SHADER);
      
      const program = gl.createProgram();
      gl.attachShader(program, vertexShader);
      gl.attachShader(program, fragmentShader);
      gl.linkProgram(program);
      
      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error('Program linking error:', gl.getProgramInfoLog(program));
        return;
      }
      
      gl.useProgram(program);
      
      // Get attribute and uniform locations
      const positionLocation = gl.getAttribLocation(program, 'aPosition');
      const resolutionLocation = gl.getUniformLocation(program, 'uResolution');
      const timeLocation = gl.getUniformLocation(program, 'uTime');
      const strainLocation = gl.getUniformLocation(program, 'uStrain');
      
      // Create a quad for drawing
      const positionBuffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
      
      const positions = [
        -1, -1,
        1, -1,
        -1, 1,
        1, 1,
      ];
      
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);
      
      // Set up vertex attributes
      gl.enableVertexAttribArray(positionLocation);
      gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);
      
      // Audio context for sound synthesis
      let audioContext;
      let oscillator;
      let gainNode;
      
      function initAudio() {
        if (!window.AudioContext) {
          console.warn('Web Audio API not supported');
          return;
        }
        
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioContext.createGain();
        gainNode.connect(audioContext.destination);
        gainNode.gain.value = 0;
      }
      
      // Play sound based on strain level
      function playSound(strain) {
        if (!audioContext) return;
        
        // Create oscillator if needed
        if (!oscillator) {
          oscillator = audioContext.createOscillator();
          oscillator.type = 'sawtooth';
          oscillator.connect(gainNode);
          oscillator.start();
        }
        
        // Adjust pitch and volume based on strain
        const pitch = 100 + strain * 800; // 100Hz to 900Hz
        oscillator.frequency.setValueAtTime(pitch, audioContext.currentTime);
        
        const volume = strain * 0.3;
        gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
      }
      
      // State variables
      let strain = 0.0;
      let strainStartTime = 0;
      let isStraining = false;
      let lastTime = 0;
      
      // Mouse position tracking
      let mouseX = 0;
      let mouseY = 0;
      
      canvas.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });
      
      // Animation loop
      function animate(time) {
        const deltaTime = time - lastTime;
        lastTime = time;
        
        // Update strain based on mouse proximity to center
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const distance = Math.sqrt(Math.pow(mouseX - centerX, 2) + Math.pow(mouseY - centerY, 2));
        const maxDistance = Math.min(canvas.width, canvas.height) * 0.3;
        
        // Calculate strain based on distance
        let newStrain = 0;
        if (distance < maxDistance) {
          newStrain = 1.0 - (distance / maxDistance);
          if (!isStraining) {
            isStraining = true;
            strainStartTime = time;
          }
        } else {
          isStraining = false;
        }
        
        // Update strain with timing
        if (isStraining) {
          const elapsed = (time - strainStartTime) / 1000; // seconds
          if (elapsed < 3.0) {
            // 3-second breathing cycle
            strain = Math.min(1.0, newStrain);
            // Add slight jitter to strain for "sleeping cat" feeling
            strain += Math.sin(time * 0.005) * 0.1;
          } else {
            // Snap! 
            strain = 0.0;
            // Create a snap effect by briefly increasing strain
            strain = 1.0;
            setTimeout(() => { strain = 0.0; }, 100);
          }
        } else {
          // Fade out strain
          strain = Math.max(0, strain - deltaTime * 0.001);
        }
        
        // Update debug info
        debugText.textContent = `Strain: ${strain.toFixed(2)} | Time: ${(time/1000).toFixed(1)}s`;
        
        // Play sound based on strain
        playSound(strain);
        
        // Render
        gl.uniform2f(resolutionLocation, canvas.width, canvas.height);
        gl.uniform1f(timeLocation, time * 0.001);
        gl.uniform1f(strainLocation, strain);
        
        gl.clearColor(0, 0, 0, 1);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        
        requestAnimationFrame(animate);
      }
      
      // Initialize audio and start animation
      initAudio();
      animate(0);
      
    })();
  </script>
</body>
</html>
